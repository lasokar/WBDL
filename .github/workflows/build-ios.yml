name: build-ios-unsigned

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Capacitor
        run: npm install @capacitor/core @capacitor/ios @capacitor/cli

      - name: Init Capacitor project
        run: |
          if [ ! -f capacitor.config.json ]; then
            npx cap init "WBDL" "org.yourname.wbdl" --web-dir public
          fi

      - name: Point Capacitor at live site
        run: |
          node -e "
            const fs = require('fs');
            const cfg = JSON.parse(fs.readFileSync('capacitor.config.json'));
            cfg.server = { url: 'https://webdemonlist.org', cleartext: false };
            fs.writeFileSync('capacitor.config.json', JSON.stringify(cfg, null, 2));
          "

      - name: Add iOS platform
        run: |
          if [ ! -d ios ]; then
            npx cap add ios
          fi

      - run: npx cap sync ios

      - name: Build unsigned app
        working-directory: ios/App
        run: |
          xcodebuild -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath $RUNNER_TEMP/build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            build

      - name: Package IPA
        run: |
          mkdir -p $RUNNER_TEMP/Payload
          cp -r $RUNNER_TEMP/build/Build/Products/Release-iphoneos/App.app $RUNNER_TEMP/Payload/
          cd $RUNNER_TEMP
          zip -r wbdl-unsigned.ipa Payload

      - uses: actions/upload-artifact@v4
        with:
          name: wbdl-unsigned-ipa
          path: ${{ runner.temp }}/wbdl-unsigned.ipa
