<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rate Limited | WBDL</title>
    <link rel="icon" type="image/png" href="/assets/icon.png">
    <link rel="stylesheet" href="/style.css">
    <style>
        html,
        body {
            width: 100%;
            min-height: 100%;
        }

        body {
            min-height: 100vh;
            min-height: 100dvh;
            display: grid;
            place-items: center;
            margin: 0;
            padding: 24px;
            background: var(--bg, #101114);
            color: var(--text, #f2f3f5);
            box-sizing: border-box;
        }

        .rate-limit-card {
            position: relative;
            z-index: 2;
            width: min(520px, 100%);
            background: var(--surface, #161a1f);
            border: 1px solid var(--border, #2a2f36);
            border-radius: var(--radius, 14px);
            padding: 42px 28px;
            text-align: center;
            pointer-events: none;
        }

        .rate-limit-card h1 {
            margin: 0;
            color: #ff4444;
            font-family: var(--font-display, inherit);
            font-size: 20px;
            line-height: 1;
            letter-spacing: 0.5px;
        }

        .rate-limit-card p {
            margin: 16px auto 0;
            max-width: 360px;
            color: var(--text-muted, #8b929c);
            font-size: 1rem;
            line-height: 1.55;
        }
    </style>
</head>
<body>
    <main class="rate-limit-card">
        <h1>slow down (429)</h1>
        <p>This is a rate limit error message. You sent too many requests bru</p>
    </main>
</body>
</html>
