<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notifications | WBDL</title>
    <link rel="icon" type="image/png" href="/assets/icon.png">
    <link rel="stylesheet" href="/style.css">
    <style>
        .noti-page-container { max-width: 820px; margin: 0 auto; padding: 50px 20px 100px; min-height: 80vh; flex: 1 0 auto; box-sizing: border-box; width: 100%; }
        .noti-page-container h1 { margin: 0 0 24px; color: var(--text); font-size: 2rem; }
        .noti-list { display: grid; gap: 10px; }
        .noti-card {
            width: 100%;
            box-sizing: border-box;
            text-align: left;
            background: var(--surface);
            padding: 17px 18px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
            color: var(--text);
            cursor: pointer;
            font: inherit;
            transition: background 0.15s, border-color 0.15s;
        }
        .noti-card:hover { background: var(--surface-2); }
        .noti-card.unread { background: var(--surface-2); }
        .noti-subject { display: flex; align-items: center; font-size: 1rem; font-weight: 800; line-height: 1.35; }
        .noti-empty { color: var(--text-muted); background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 24px; text-align: center; }

        .message-overlay {
            position: fixed;
            inset: 0;
            z-index: 1100;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: rgba(0,0,0,0.75);
            box-sizing: border-box;
        }
        .message-overlay.visible { display: flex; }
        .message-popup {
            position: relative;
            width: min(100%, 620px);
            max-height: 84vh;
            overflow-y: auto;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: 0 20px 70px rgba(0,0,0,0.5);
            padding: 24px;
            box-sizing: border-box;
        }
        .message-close { position: absolute; top: 15px; right: 16px; background: none; border: 0; color: var(--text-muted); font-size: 1.65rem; cursor: pointer; }
        .message-close:hover { color: var(--danger); }
        .message-popup h2 { margin: 0 38px 7px 0; color: var(--text); font-size: 1.35rem; line-height: 1.3; }
        .message-popup .message-meta { color: var(--text-muted); font-size: 0.82rem; padding-bottom: 16px; margin-bottom: 18px; border-bottom: 1px solid var(--border); }
        .message-body { color: var(--text); line-height: 1.65; overflow-wrap: anywhere; }
        .message-body p { margin: 0 0 13px; }
        .message-body p:last-child { margin-bottom: 0; }
        .message-body ul { margin: 0 0 13px; padding-left: 22px; }
        .message-body a { color: var(--accent); }
        .message-body code { background: var(--bg); border: 1px solid var(--border); border-radius: 4px; padding: 2px 5px; font-family: monospace; }
        .message-body pre { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 13px; overflow-x: auto; }
        .message-body pre code { border: 0; padding: 0; }
        .message-body blockquote { margin: 0 0 13px; padding: 8px 12px; border-left: 3px solid var(--accent); background: var(--bg); color: var(--text-muted); }
    </style>
</head>
<body>
    <div id="global-nav"></div>
    <main class="noti-page-container">
        <h1>Notifications</h1>
        <div id="notifications-full-list" class="noti-list"><p style="color:var(--text-muted);">Loading...</p></div>
    </main>

    <div id="message-overlay" class="message-overlay" aria-hidden="true">
        <article class="message-popup" role="dialog" aria-modal="true" aria-labelledby="message-subject">
            <button type="button" class="message-close" onclick="closeMessage()" aria-label="Close">&times;</button>
            <h2 id="message-subject">Notification</h2>
            <div id="message-meta" class="message-meta"></div>
            <div id="message-body" class="message-body"></div>
        </article>
    </div>

    <script src="/nav.js"></script>
    <script>
        const isImpossibleList = window.location.hostname.includes('impossible');
        if (isImpossibleList) document.body.classList.add('impossible-list');

        let inboxMessages = [];

        function escapeHtml(value) {
            return String(value ?? '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function applyInlineMarkdown(text) {
            return text
                .replace(/`([^`]+)`/g, '<code>$1</code>')
                .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
                .replace(/__([^_]+)__/g, '<strong>$1</strong>')
                .replace(/\*([^*]+)\*/g, '<em>$1</em>')
                .replace(/_([^_]+)_/g, '<em>$1</em>')
                .replace(/\[([^\]]+)\]\((https?:\/\/[^\s)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
        }

        function renderMarkdown(markdown) {
            const codeBlocks = [];
            let source = String(markdown || '').replace(/```(?:\w+)?\n?([\s\S]*?)```/g, (_, code) => {
                const token = `@@CODE_BLOCK_${codeBlocks.length}@@`;
                codeBlocks.push(`<pre><code>${escapeHtml(code.trim())}</code></pre>`);
                return token;
            });

            const lines = escapeHtml(source).split(/\r?\n/);
            const output = [];
            let listOpen = false;

            const closeList = () => {
                if (listOpen) {
                    output.push('</ul>');
                    listOpen = false;
                }
            };

            for (const rawLine of lines) {
                const line = rawLine.trimEnd();
                if (!line.trim()) {
                    closeList();
                    continue;
                }
                if (/^@@CODE_BLOCK_\d+@@$/.test(line.trim())) {
                    closeList();
                    output.push(line.trim());
                    continue;
                }
                const bullet = line.match(/^\s*[-*]\s+(.+)$/);
                if (bullet) {
                    if (!listOpen) { output.push('<ul>'); listOpen = true; }
                    output.push(`<li>${applyInlineMarkdown(bullet[1])}</li>`);
                    continue;
                }

                closeList();
                const heading = line.match(/^(#{1,3})\s+(.+)$/);
                if (heading) {
                    const level = heading[1].length + 2;
                    output.push(`<h${level}>${applyInlineMarkdown(heading[2])}</h${level}>`);
                } else if (/^&gt;\s?/.test(line)) {
                    output.push(`<blockquote>${applyInlineMarkdown(line.replace(/^&gt;\s?/, ''))}</blockquote>`);
                } else {
                    output.push(`<p>${applyInlineMarkdown(line)}</p>`);
                }
            }
            closeList();

            let html = output.join('');
            codeBlocks.forEach((block, index) => {
                html = html.replace(`@@CODE_BLOCK_${index}@@`, block);
            });
            return html;
        }

        function formatDate(value) {
            const date = new Date(value);
            return Number.isNaN(date.getTime()) ? '' : date.toLocaleString();
        }

        async function loadFullNotifications() {
            const container = document.getElementById('notifications-full-list');
            try {
                const res = await fetch('/api/notifications');
                const data = await res.json();
                if (!res.ok) throw new Error(data.error || 'Could not load notifications.');
                inboxMessages = Array.isArray(data) ? data : [];

                if (!inboxMessages.length) {
                    container.innerHTML = '<div class="noti-empty">You have no notifications yet.</div>';
                    return;
                }

                container.innerHTML = inboxMessages.map(message => `
                    <button type="button" class="noti-card ${message.is_read ? '' : 'unread'}" id="notification-${message.id}" onclick="openMessage(${message.id})">
                        <div class="noti-subject"><span>${escapeHtml(message.subject)}</span></div>
                    </button>
                `).join('');
            } catch (err) {
                container.innerHTML = `<div class="noti-empty" style="color:var(--danger);">${escapeHtml(err.message)}</div>`;
            }
        }

        async function openMessage(id) {
            const message = inboxMessages.find(item => Number(item.id) === Number(id));
            if (!message) return;

            document.getElementById('message-subject').innerText = message.subject || 'Notification';
            document.getElementById('message-meta').innerText = `${formatDate(message.created_at)} • Sent by ${message.sent_by || 'WBDL'}`;
            document.getElementById('message-body').innerHTML = renderMarkdown(message.body || '');
            const overlay = document.getElementById('message-overlay');
            overlay.classList.add('visible');
            overlay.setAttribute('aria-hidden', 'false');

            if (!message.is_read) {
                message.is_read = true;
                const card = document.getElementById(`notification-${message.id}`);
                if (card) {
                    card.classList.remove('unread');
                }
                fetch('/api/notifications/read', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ notificationId: message.id })
                }).catch(() => {});
            }
        }

        function closeMessage() {
            const overlay = document.getElementById('message-overlay');
            overlay.classList.remove('visible');
            overlay.setAttribute('aria-hidden', 'true');
        }

        document.getElementById('message-overlay').addEventListener('click', event => {
            if (event.target.id === 'message-overlay') closeMessage();
        });
        document.addEventListener('keydown', event => {
            if (event.key === 'Escape') closeMessage();
        });

        loadFullNotifications();
    </script>
</body>
</html>
