<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WBDL | Web Browser Demon List</title>
    <meta name="title" content="WBDL | Web Browser Demon List">
    <meta name="description"
        content="The unofficial ranking for the hardest levels beaten in 'Geometry Dash: Try Me!'.">
    <meta name="keywords"
        content="Geometry Dash, Demonlist, WBDL, Browser Geometry Dash, GD Try Me, Hardest Levels, geometrydash.com, web browser demonlist">
    <meta name="author" content="Lasokar">
    <meta name="theme-color" content="#00e676">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://webdemonlist.org/">
    <meta property="og:title" content="WBDL | Web Browser Demon List">
    <meta property="og:description"
        content="The unofficial ranking for the hardest levels beaten in 'Geometry Dash: Try Me!'.">
    <meta property="og:image" content="/assets/icon.png">

    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://webdemonlist.org/">
    <meta property="twitter:title" content="WBDL | Web Browser Demon List">
    <meta property="twitter:description"
        content="The unofficial ranking for the hardest levels beaten in 'Geometry Dash: Try Me!'.">
    <meta property="twitter:image" content="/assets/icon.png">

    <link rel="icon" type="image/png" href="/assets/icon.png">

    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="/index.css">
</head>

<body>

    <div id="global-nav"></div>

    <div class="page-content">
        <div id="list-container">
            <p style="text-align: center; color: #888;">Fetching levels...</p>
        </div>

        <div id="level-viewer">
            <p style="color: var(--text-muted); text-align: center; margin-top: 40px;">
                Select a level from the left to view details and records.
            </p>
        </div>

        <div class="sidebar-right">
            <header class="list-header">
                <h1 id="headline-text">Welcome to the WBDL</h1>
                <p id="subheadline-text">The Web Browser Demonlist Ranks the hardest levels completed on the "Geometry
                    Dash: Try Me!" website.</p>
            </header>

            <div class="list-tabs" id="list-tabs-container" style="display: none;">
                <div class="list-tab active" id="tab-main" onclick="switchListTab('main')">Demon List</div>
                <div class="list-tab" id="tab-legacy" onclick="switchListTab('legacy')">Legacy List</div>
            </div>

            <div id="staff-container"></div>
        </div>
    </div>

    <script src="/nav.js"></script>
    <script>
        const isImpossibleList = window.location.hostname.includes('impossible');
        let allDemons = [];
        let currentListTab = 'main';

        if (isImpossibleList) {
            document.body.classList.add('impossible-list');

            document.getElementById('headline-text').innerText = "Web Browser ILL";
            document.getElementById('subheadline-text').innerText = "...the human limit of Web Dashers";
        }

        function getYTId(url) {
            if (!url) return null;
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            const match = url.match(regExp);
            return (match && match[2].length === 11) ? match[2] : null;
        }

        function extract100thFrame(url, imgId) {
            if (!url) return;
            const video = document.createElement('video');
            video.src = url;
            video.crossOrigin = 'anonymous';
            video.muted = true;
            video.playsInline = true;

            video.addEventListener('loadedmetadata', () => {
                video.currentTime = 5.0; // ts just takes the frame 5 seconds in as the thumnbail
            });

            video.addEventListener('seeked', () => {
                try {
                    const canvas = document.createElement('canvas');
                    canvas.width = video.videoWidth || 320;
                    canvas.height = video.videoHeight || 180;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

                    const img = document.getElementById(imgId);
                    if (img) {
                        img.src = canvas.toDataURL('image/jpeg');
                    }
                } catch (err) {
                    console.error("Could not capture frame due to a CORS restriction or encoding error: ", err);
                }
            });

            video.addEventListener('error', (err) => {
                console.error("Failed to load video thumbnail source:", err);
            });
        }

        function switchListTab(tab) {
            currentListTab = tab;
            document.getElementById('tab-main').classList.toggle('active', tab === 'main');
            document.getElementById('tab-legacy').classList.toggle('active', tab === 'legacy');
            renderDemons();
        }

        function renderDemons() {
            const container = document.getElementById('list-container');
            container.innerHTML = '';

            const filteredDemons = allDemons.filter(d => {
                if (currentListTab === 'main') return d.position <= 150;
                return d.position > 150;
            });

            if (filteredDemons.length === 0) {
                container.innerHTML = `<p style="text-align: center; color: var(--text-muted); margin-top: 20px;">No levels currently exist in this section.</p>`;
                return;
            }

            const nonYtVideoQueue = [];

            const htmlContent = filteredDemons.map(demon => {
                const ytId = getYTId(demon.showcase_link);
                let thumbUrl = '/assets/missing-thumbnail.png';
                const imgId = `thumb-${demon.id}`;

                if (ytId) {
                    thumbUrl = `https://img.youtube.com/vi/${ytId}/mqdefault.jpg`;
                } else if (demon.showcase_link) {
                    nonYtVideoQueue.push({ url: demon.showcase_link, id: imgId });
                }

                let sideContentHtml = "";

                if (isImpossibleList) {
                    const records = demon.records || [];
                    const bestPercentage = records.length > 0
                        ? Math.max(...records.map(r => r.percentage || 0))
                        : 0;

                    sideContentHtml = `<div class="wr-badge">WR: ${bestPercentage}%</div>`;
                } else {
                    const fullPoints = 250 * Math.exp(-0.0263 * (demon.position - 1));
                    const reqPoints = fullPoints / 10;
                    let pointsHtml = "";

                    if (demon.position > 75) {
                        pointsHtml = `
                            <span style="color: var(--accent); font-weight: 600;">${fullPoints.toFixed(2)}</span>
                            <span>points</span>
                        `;
                    } else {
                        pointsHtml = `
                            <span style="color: var(--text); font-weight: 600;">${reqPoints.toFixed(2)}</span>
                            <span>(${demon.requirement}%)</span>
                            <span style="margin: 0 4px; opacity: 0.4;">—</span>
                            <span style="color: var(--accent); font-weight: 600;">${fullPoints.toFixed(2)}</span>
                            <span>(100%) points</span>
                        `;
                    }

                    sideContentHtml = `
                        <div class="points-row">
                            ${pointsHtml}
                        </div>
                    `;
                }

                const showPlacement = currentListTab === 'main';
                const showPoints = !isImpossibleList && showPlacement;
                const rankHtml = showPlacement ? `<span class="rank">#${demon.position}</span>` : '';

                return `
                    <a href="javascript:void(0);" style="text-decoration: none; color: inherit; display: block; width: 100%;" onclick="selectDemon('${demon.id}')">
                        <div class="demon-card" style="cursor: pointer;">
                            ${rankHtml}
                            <div class="thumbnail-box">
                                <img id="${imgId}" src="${thumbUrl}" alt="${demon.name} thumbnail">
                            </div>
                            <div class="card-body">
                                <div class="card-main-content">
                                    <div class="demon-info">
                                        <span class="b">${demon.name}</span>
                                        <div style="color: var(--text-muted); font-size: 0.85em; margin-top: 4px;">published by ${demon.author}</div>
                                        ${showPoints ? sideContentHtml : ''}
                                    </div>
                                </div>
                                ${isImpossibleList ? sideContentHtml : ''}
                            </div>
                        </div>
                    </a>
                `;
            }).join('');

            container.innerHTML = htmlContent;

            nonYtVideoQueue.forEach(item => {
                extract100thFrame(item.url, item.id);
            });
        }

        async function loadDemons() {
            try {
                const response = await fetch('/api/demons');
                allDemons = await response.json();

                const hasLegacy = allDemons.some(d => d.position > 150);
                if (hasLegacy) {
                    document.getElementById('list-tabs-container').style.display = 'flex';
                }

                renderDemons();
            } catch (err) {
                console.error(err);
                document.getElementById('list-container').innerHTML = `<p style="color:red; text-align:center;">Failed to load list.</p>`;
            }
            loadDemon();
        }

        async function loadStaff() { //from staff.html
            try {
                const res = await fetch('/api/staff');
                const data = await res.json();
                const container = document.getElementById('staff-container');

                const sections = [
                    { title: 'Owner', key: 'owners', class: 'rank-owner', badge: 'assets/eldermoderator.png' },
                    { title: 'Admins', key: 'admins', class: 'rank-admin', badge: 'assets/eldermoderator.png' },
                    { title: 'Moderators', key: 'moderators', class: 'rank-moderator', badge: 'assets/moderator.png' }
                ];

                container.innerHTML = sections.map(section => {
                    const members = data[section.key];
                    if (!members || members.length === 0) return '';

                    return `
                        <div class="staff-section">
                            <h2 class="${section.class}">${section.title}</h2>
                            <div class="staff-flex">
                                ${members.map(m => `
                                    <div class="staff-card">
                                        <img src="/${section.badge}" class="staff-badge" alt="Badge">
                                        <a href="/profile?user=${m.username}">${m.username}</a>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    `;
                }).join('');
            } catch (err) {
                console.error("Failed to load staff profiles:", err);
            }
        }

        loadDemons();
        loadStaff();

        function selectDemon(id) { //when clicking a demon from the list
            window.selectedDemonId = id;

            const newUrl = `${window.location.pathname}?id=${id}`;
            window.history.pushState({}, '', newUrl);

            loadDemon(id);
        }

        /* current selected demon display (from demon.html) */

        function openTab(evt, tabId) {
            const contents = document.getElementsByClassName("tab-content");
            for (let i = 0; i < contents.length; i++) {
                contents[i].classList.remove("active");
            }

            const buttons = document.getElementsByClassName("tab-btn");
            for (let i = 0; i < buttons.length; i++) {
                buttons[i].classList.remove("active");
            }

            document.getElementById(tabId).classList.add("active");
            evt.currentTarget.classList.add("active");
        }

        async function loadDemon(explicitID) { //changed
            let dbKey = explicitID;

            if (!dbKey) {
                const urlParams = new URLSearchParams(window.location.search);
                dbKey = urlParams.get('id');
            }

            if (!dbKey && typeof allDemons !== 'undefined' && allDemons.length > 0) {
                // Find the demon positioned at #1
                const topDemon = allDemons.find(d => d.position === 1) || allDemons[0];
                if (topDemon) dbKey = topDemon.id;
            }

            if (!dbKey) return; //when no demon is selected

            const res = await fetch(`/api/demons/${dbKey}`);
            if (!res.ok) return document.getElementById('level-viewer').innerHTML = "<h1>Level not found</h1>";

            const data = await res.json();

            const isLegacy = data.position > 150;
            const titleText = isLegacy ? data.name : `#${data.position} - ${data.name}`;
            const warningDisplay = isLegacy ? 'block' : 'none';

            let mediaHtml = "";
            if (data.showcase_link) {
                mediaHtml = getEmbedHtml(data.showcase_link);
            }

            const recordsHtml = data.records.map(r => {
                let percentageColor = "";
                if (r.percentage === 100) {
                    percentageColor = typeof isImpossibleList !== 'undefined' && isImpossibleList ? "#ff4444" : "#00e676";
                } else {
                    percentageColor = typeof isImpossibleList !== 'undefined' && isImpossibleList ? "#ff6666" : "#ffaa00";
                }

                return `
            <div class="record-row">
                <span>
                    <a href="/profile?user=${r.username}">${r.username}</a> 
                    <span style="color:${percentageColor}"> - ${r.percentage}%</span>
                </span>
                <a href="${r.video_url}" target="_blank" class="proof">Watch</a>
            </div>
        `;
            }).join('') || "<p style='color:#666; padding: 15px;'>No records yet.</p>";

            const viewer = document.getElementById('level-viewer');
            viewer.innerHTML = `
        <div id="main-content" style="display: block;">
            <div id="legacy-warning" class="legacy-warning" style="display: ${warningDisplay};">
                This level is in the legacy list, you CANNOT submit records for it!
            </div>

            <div class="info-header">
                <h1 id="demon-name">${titleText}</h1>
                <div style="margin-top: 10px; display: flex; align-items: center; gap: 15px;">
                    <p style="margin: 0;">Published by <span id="demon-author" style="color: var(--text);"><strong>${data.author}</strong></span></p>
                    <span id="level-id-tag">ID: ${data.level_id}</span>
                </div>
                <a id="play-link" href="https://web-dashers.github.io/?id=${data.level_id}" target="_blank">
                    Play Level!
                </a>
            </div>

            <div class="video-container" id="video-container">
                ${mediaHtml}
            </div>

            <div class="tabs">
                <button class="tab-btn active" onclick="openTab(event, 'records')">Records</button>
                <button class="tab-btn" onclick="openTab(event, 'history')">Position History</button>
            </div>

            <div id="records" class="tab-content active">
                <div id="records-list">
                    ${recordsHtml}
                </div>
            </div>

            <div id="history" class="tab-content">
                <table class="history-table">
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Change</th>
                            <th>New Position</th>
                            <th>Reason</th>
                        </tr>
                    </thead>
                    <tbody id="history-list">
                        </tbody>
                </table>
            </div>
        </div>
    `;

            loadHistory(dbKey);
        }

        function getEmbedHtml(url) {
            if (!url) return `<p style="color:var(--text-muted); text-align:center; padding: 40px 0;">No video documentation available.</p>`;

            const ytRegex = /(?:youtube\.com\/(?:[^\/]+\/.+\/|(?:v|e(?:mbed)?)\/|.*[?&]v=)|youtu\.be\/)([^"&?\/ ]{11})/;
            const ytMatch = url.match(ytRegex);

            if (ytMatch) {
                const videoId = ytMatch[1];
                return `<iframe src="https://www.youtube.com/embed/${videoId}" allowfullscreen></iframe>`;
            }

            return `
                <video controls playsinline style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: contain;">
                    <source src="${url}" type="video/mp4">
                    <source src="${url}" type="video/webm">
                    Your browser does not support the video tag.
                </video>
            `;
        }

        async function loadHistory(id) {
            try {
                const res = await fetch(`/api/demons/${id}/history`);
                if (!res.ok) return;

                const history = await res.json();

                let historyList = document.getElementById('history-list');
                if (!historyList) {
                    const viewer = document.getElementById('level-viewer');
                    if (viewer) {
                        const historySection = document.createElement('div');
                        historySection.className = 'history-section';
                        historySection.style.marginTop = '30px';
                        historySection.innerHTML = `
                    <h3>Changelog History</h3>
                    <table style="width: 100%; border-collapse: collapse; text-align: left; margin-top: 15px;">
                        <thead>
                            <tr style="border-bottom: 1px solid var(--border); color: var(--text-muted); font-size: 0.9em;">
                                <th style="padding: 8px;">Date</th>
                                <th style="padding: 8px;">Change</th>
                                <th style="padding: 8px;">Position</th>
                                <th style="padding: 8px;">Reason</th>
                            </tr>
                        </thead>
                        <tbody id="history-list"></tbody>
                    </table>
                `;
                        viewer.appendChild(historySection);

                        historyList = document.getElementById('history-list');
                    }
                }

                if (!historyList) return;

                if (!history.length) {
                    historyList.innerHTML = "<tr><td colspan='4' style='text-align:center; color:#666; padding: 15px;'>No history recorded.</td></tr>";
                    return;
                }

                const visibleHistory = history.filter(log => {
                    if (log.change_type === 'added') return true;

                    const newPosition = Number(log.new_position);
                    const diff = Number(log.diff || 0);
                    const oldPosition = newPosition + diff;

                    const wasLegacy = oldPosition > 150;
                    const isLegacy = newPosition > 150;

                    return !(wasLegacy && isLegacy);
                });

                if (!visibleHistory.length) {
                    historyList.innerHTML = "<tr><td colspan='4' style='text-align:center; color:#666; padding: 15px;'>No visible history recorded.</td></tr>";
                    return;
                }

                historyList.innerHTML = visibleHistory.map(log => {
                    const date = new Date(log.created_at).toLocaleDateString(undefined, {
                        month: 'short', day: 'numeric', year: 'numeric'
                    });

                    let changeStr = "-";
                    let rowClass = "row-neutral";

                    if (log.diff > 0) {
                        changeStr = `+${log.diff}`;
                        rowClass = "row-up";
                    } else if (log.diff < 0) {
                        changeStr = `${log.diff}`;
                        rowClass = "row-down";
                    } else if (log.change_type === 'added') {
                        changeStr = "NEW";
                    }

                    const formattedReason = log.reason
                        ? log.reason.replace(/\*\*(.*?)\*\*/g, '<span class="b">$1</span>')
                        : '';

                    return `
                <tr class="${rowClass}" style="border-bottom: 1px solid var(--border);">
                    <td style="padding: 10px 8px; color: var(--text-muted); font-size: 0.9em;">${date}</td>
                    <td style="padding: 10px 8px; font-weight: bold;">${changeStr}</td>
                    <td style="padding: 10px 8px;">${log.new_position > 150 ? 'Legacy' : `#${log.new_position}`}</td>
                    <td style="padding: 10px 8px; font-size: 0.9em;">${formattedReason}</td>
                </tr>
            `;
                }).join('');
            } catch (err) {
                console.error("History failed to load:", err);
            }
        }

        loadDemon();
    </script>
</body>

</html>
