<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WBDL | Web Browser Demon List</title>
    <meta name="title" content="WBDL | Web Browser Demon List">
    <meta name="description" content="The unofficial ranking for the hardest levels beaten in 'Geometry Dash: Try Me!'.">
    <meta name="keywords" content="Geometry Dash, Demonlist, WBDL, Browser Geometry Dash, GD Try Me, Hardest Levels, geometrydash.com, web browser demonlist">
    <meta name="author" content="Lasokar">
    <meta name="theme-color" content="#3375a7">

    <meta property="og:type" content="website">
    <meta property="og:url" content="https://webdemonlist.org/"> 
    <meta property="og:title" content="WBDL | Web Browser Demon List">
    <meta property="og:description" content="The unofficial ranking for the hardest levels beaten in 'Geometry Dash: Try Me!'.">
    <meta property="og:image" content="/assets/icon.png">

    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://webdemonlist.org/">
    <meta property="twitter:title" content="WBDL | Web Browser Demon List">
    <meta property="twitter:description" content="The unofficial ranking for the hardest levels beaten in 'Geometry Dash: Try Me!'.">
    <meta property="twitter:image" content="/assets/icon.png">

    <link rel="icon" type="image/png" href="/assets/icon.png">
    
    <link rel="stylesheet" href="/style.css">
    
    <style>
        :root { --wbdl-header-height: 72px; }

        .page-content {
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px 20px 60px;
        }

        .list-header {
            text-align: center;
            padding: 50px 0 30px;
        }

        .list-header h1 {
            font-size: 2.6em;
            margin-bottom: 14px;
            color: var(--accent);
        }

        .list-header p {
            color: var(--text-muted);
            max-width: 560px;
            margin: 0 auto;
        }

        .list-tabs {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 30px;
        }

        .list-tab {
            padding: 10px 24px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            color: var(--text-muted);
            cursor: pointer;
            font-family: var(--font-display);
            font-weight: 600;
        }

        .list-tab:hover {
            border-color: var(--accent);
            color: var(--text);
        }

        .list-tab.active {
            background: var(--accent);
            color: #000;
            border-color: var(--accent);
        }

        .demon-card {
            background: var(--surface);
            margin: 14px 0;
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            border-radius: var(--radius);
            transition: border-color 0.15s, background 0.15s;
            overflow: hidden;
        }

        .demon-card:hover {
            background: var(--surface-2);
            border-color: var(--accent);
        }

        .thumbnail-box {
            width: 220px;
            height: 124px;
            background: #000;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .thumbnail-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .card-body {
            display: flex;
            align-items: center;
            width: 100%;
            padding: 16px 26px;
            justify-content: space-between;
        }

        .card-main-content {
            display: flex;
            align-items: center;
        }

        .rank {
            font-family: var(--font-display);
            font-size: 2.4em;
            margin-right: 22px;
            color: var(--accent);
            min-width: 64px;
        }

        .demon-info .b {
            font-family: var(--font-display);
            font-weight: 700;
            font-size: 1.15em;
            color: var(--text);
        }

        .points-row {
            margin-top: 8px;
            font-size: 0.9em;
            color: var(--text-muted);
        }


        .card-main-content,
        .demon-info {
            min-width: 0;
            max-width: 100%;
        }

        .demon-info .b,
        .points-row {
            display: block;
            max-width: 100%;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: clip;
            line-height: 1.15;
        }

        .wr-badge {
            font-family: var(--font-display);
            font-size: 1.2em;
            color: var(--accent);
            background: var(--surface-2);
            padding: 8px 16px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
            white-space: nowrap;
            margin-left: 30px;
        }


        #level-viewer-panel,
        .staff-iframe-panel {
            display: none;
        }

        @media (min-width: 1500px) {
            html,
            body {
                overflow-x: hidden;
                overflow-y: auto;
            }

            footer,
            .site-footer,
            #global-footer {
                margin-top: 0 !important;
            }

            .page-content {
                max-width: none;
                margin: 0;
                padding: 0 20px;
                display: grid;
                grid-template-columns: minmax(360px, 500px) minmax(0, 1fr) 320px;
                grid-template-rows: auto auto minmax(0, 1fr);
                gap: 20px;
                align-items: start;
                height: calc(100dvh - var(--wbdl-header-height));
                min-height: 0;
                box-sizing: border-box;
            }

            .list-header {
                grid-column: 3;
                grid-row: 1;
                text-align: left;
                margin-top: 20px;
                padding: 0px;
                min-height: 150px;
                box-sizing: border-box;
            }

            .list-header h1 {
                font-size: 2.35em;
                min-height: 2.4em;
                line-height: 1.15;
                display: flex;
                align-items: flex-start;
            }

            .list-header p {
                max-width: none;
                min-height: 3.2em;
                line-height: 1.45;
                margin: 0;
            }

            .list-tabs {
                grid-column: 3;
                grid-row: 2;
                display: flex;
                flex-direction: row;
                gap: 10px;
                margin: 0;
            }

            .list-tab {
                flex: 1 1 0;
                width: auto;
                text-align: center;
                padding-left: 10px;
                padding-right: 10px;
            }

            #list-container {
                grid-column: 1;
                grid-row: 1 / span 3;
                display: flex;
                flex-direction: column;
                gap: 14px;
                height: calc(100dvh - var(--wbdl-header-height));
                max-height: calc(100dvh - var(--wbdl-header-height));
                overflow-y: auto;
                overscroll-behavior: contain;
                padding: 20px 8px 20px 0;
                box-sizing: border-box;
                -ms-overflow-style: none;
                scrollbar-width: none;
            }

            #list-container::-webkit-scrollbar {
                display: none;
            }

            #level-viewer-panel {
                grid-column: 2;
                grid-row: 1 / span 3;
                display: block;
                margin-top: 20px;
                margin-bottom: 20px;
                height: calc(100dvh - var(--wbdl-header-height) - 40px);
                min-height: 420px;
                max-height: calc(100dvh - var(--wbdl-header-height) - 40px);
                background: var(--surface);
                border: 1px solid var(--border);
                border-radius: var(--radius);
                overflow: hidden;
                overscroll-behavior: contain;
                box-sizing: border-box;
            }

            .staff-iframe-panel {
                grid-column: 3;
                grid-row: 3;
                display: flex;
                width: 100%;
                min-height: 0;
                height: 100%;
                box-sizing: border-box;
                overflow: hidden;
                overscroll-behavior: contain;
            }

            #staff-frame {
                flex: 1 1 auto;
                width: 100%;
                height: 100%;
                min-height: 0;
                pointer-events: auto;
            }

            .embed-frame {
                width: 100%;
                height: 100%;
                min-height: 0;
                border: 0;
                display: block;
                background: transparent;
                overscroll-behavior: contain;
                scrollbar-width: none;
                -ms-overflow-style: none;
            }

            .embed-frame::-webkit-scrollbar {
                display: none;
                width: 0;
                height: 0;
            }

            #level-viewer-placeholder {
                height: 100%;
                display: flex;
                align-items: center;
                justify-content: center;
                padding: 28px;
                color: var(--text-muted);
                text-align: center;
                box-sizing: border-box;
            }

            .demon-card {
                height: 108px;
                min-height: 108px;
                max-height: 108px;
                box-sizing: border-box;
                margin: 0;
                flex-direction: row;
                padding-left: 14px;
            }

            .thumbnail-box {
                width: 140px;
                height: 79px;
                margin-left: 12px;
            }

            .card-body {
                padding: 14px 18px;
                flex-direction: row;
                align-items: center;
                gap: 12px;
                min-width: 0;
                overflow: hidden;
            }

            .card-main-content {
                width: 100%;
                min-width: 0;
                overflow: hidden;
            }

            .demon-info {
                min-width: 0;
                overflow: hidden;
            }

            .demon-info .b {
                font-size: 1.05em;
            }

            .points-row {
                font-size: 0.9em;
            }

            .rank {
                font-size: 1.8em;
                min-width: 48px;
                margin-right: 14px;
                text-align: center;
                flex-shrink: 0;
            }


            body.impossible-list .page-content {
                grid-template-rows: auto minmax(0, 1fr);
            }

            body.impossible-list .list-tabs {
                display: none !important;
            }

            body.impossible-list #list-container,
            body.impossible-list #level-viewer-panel {
                grid-row: 1 / span 2;
            }

            body.impossible-list .staff-iframe-panel {
                grid-row: 2;
            }

            .wr-badge {
                margin-left: auto;
                align-self: center;
            }
        }

        @media (max-width: 768px) {
            .demon-card {
                flex-direction: column;
            }
            .thumbnail-box {
                width: 100%;
                height: auto;
                aspect-ratio: 16/9;
            }
            .card-body {
                padding: 20px;
                flex-direction: column;
                align-items: flex-start;
                gap: 15px;
            }
            .card-main-content {
                width: 100%;
            }
            .wr-badge {
                align-self: flex-end;
                margin-left: 0;
            }
        }
    </style>
</head>
<body>

    <div id="global-nav"></div>

    <div class="page-content">
        <header class="list-header">
            <h1 id="headline-text">Welcome to the WBDL</h1>
            <p id="subheadline-text">The Web Browser Demonlist Ranks the hardest levels completed on the "Geometry Dash: Try Me!" website.</p>
        </header>

        <div class="list-tabs" id="list-tabs-container" style="display: none;">
            <div class="list-tab active" id="tab-main" onclick="switchListTab('main')">Demon List</div>
            <div class="list-tab" id="tab-legacy" onclick="switchListTab('legacy')">Legacy List</div>
        </div>

        <div id="list-container">
            <p style="text-align: center; color: #888;">Fetching levels...</p>
        </div>

        <section id="level-viewer-panel" aria-label="Selected level details">
            <div id="level-viewer-placeholder">
                Select a level from the list to view its details and records.
            </div>
            <iframe id="demon-frame" class="embed-frame" title="Level details" loading="lazy"></iframe>
        </section>

        <aside class="staff-iframe-panel" aria-label="Staff">
            <iframe id="staff-frame" class="embed-frame" title="WBDL Staff" loading="lazy" data-src="/staff?embed=1"></iframe>
        </aside>
    </div>

    <script src="/nav.js"></script>
    <script>
        const isImpossibleList = window.location.hostname.includes('impossible');
        let allDemons = [];
        let currentListTab = 'main';

        if (isImpossibleList) {
            document.body.classList.add('impossible-list');
            
            document.getElementById('headline-text').innerText = "Web Browser ILL";
            document.getElementById('subheadline-text').innerText = "The human limit of Web Dashers. Give these levels a try... if you dare >:)";
        }

        const desktopLayoutQuery = window.matchMedia('(min-width: 1500px)');
        let selectedDemonId = '';
        let lastKnownHeaderHeight = 72;

        function updateHeaderHeightVar() {
            const header = document.getElementById('global-nav');
            const measuredHeight = header ? Math.ceil(header.getBoundingClientRect().height) : 0;

            if (measuredHeight > 0) {
                lastKnownHeaderHeight = measuredHeight;
            }

            document.documentElement.style.setProperty('--wbdl-header-height', `${lastKnownHeaderHeight}px`);
        }

        function initHeaderHeightTracking() {
            const header = document.getElementById('global-nav');

            updateHeaderHeightVar();

            if (header) {
                if ('ResizeObserver' in window) {
                    const resizeObserver = new ResizeObserver(() => updateHeaderHeightVar());
                    resizeObserver.observe(header);
                }

                if ('MutationObserver' in window) {
                    const mutationObserver = new MutationObserver(() => {
                        requestAnimationFrame(updateHeaderHeightVar);
                    });

                    mutationObserver.observe(header, {
                        childList: true,
                        subtree: true,
                        attributes: true
                    });
                }
            }

            let frames = 0;
            const settleHeaderHeight = () => {
                updateHeaderHeightVar();
                frames += 1;

                if (frames < 90) {
                    requestAnimationFrame(settleHeaderHeight);
                }
            };

            requestAnimationFrame(settleHeaderHeight);

            window.addEventListener('load', () => {
                updateHeaderHeightVar();
                setTimeout(updateHeaderHeightVar, 50);
                setTimeout(updateHeaderHeightVar, 250);
                setTimeout(updateHeaderHeightVar, 1000);
            });
        }

        function shrinkSingleLineToFit(el, minPx = 10) {
            if (!el) return;

            const computed = window.getComputedStyle(el);
            const baseSize = Number(el.dataset.baseFontSize || parseFloat(computed.fontSize) || 16);
            el.dataset.baseFontSize = String(baseSize);
            el.style.fontSize = `${baseSize}px`;

            let size = baseSize;
            const maxIterations = 40;
            let i = 0;

            while (el.scrollWidth > el.clientWidth && size > minPx && i < maxIterations) {
                size -= 0.5;
                el.style.fontSize = `${size}px`;
                i += 1;
            }
        }

        function fitLevelCardText() {
            requestAnimationFrame(() => {
                document.querySelectorAll('.demon-info .b').forEach(el => shrinkSingleLineToFit(el, isDesktopEmbeddedLayout() ? 10 : 12));
                document.querySelectorAll('.points-row').forEach(el => shrinkSingleLineToFit(el, isDesktopEmbeddedLayout() ? 9 : 11));
            });
        }

        function isDesktopEmbeddedLayout() {
            return desktopLayoutQuery.matches;
        }

        function getDirectDemonUrl(id) {
            return `/demon/${encodeURIComponent(id)}`;
        }

        function getEmbeddedDemonUrl(id) {
            return `${getDirectDemonUrl(id)}?embed=1`;
        }

        function ensureStaffFrameLoaded() {
            if (!isDesktopEmbeddedLayout()) return;
            const staffFrame = document.getElementById('staff-frame');
            if (staffFrame && !staffFrame.src) {
                staffFrame.src = staffFrame.dataset.src || '/staff?embed=1';
            }
        }

        function setEmbeddedDemon(id) {
            if (!id) return;
            selectedDemonId = String(id);

            const frame = document.getElementById('demon-frame');
            const placeholder = document.getElementById('level-viewer-placeholder');

            if (placeholder) placeholder.style.display = 'none';
            if (frame) frame.src = getEmbeddedDemonUrl(id);
        }

        function selectDemon(id) {
            if (!isDesktopEmbeddedLayout()) {
                window.open(getDirectDemonUrl(id), '_blank', 'noopener');
                return;
            }

            setEmbeddedDemon(id);
        }



        function removeStaleIdParamFromUrl() {
            const url = new URL(window.location.href);
            if (!url.searchParams.has('id')) return;

            url.searchParams.delete('id');
            const next = `${url.pathname}${url.search}${url.hash}`;
            window.history.replaceState({}, '', next || url.pathname);
        }

        function getDefaultSelectedDemonId() {
            const filteredDemons = allDemons.filter(d => {
                if (currentListTab === 'main') return Number(d.position) <= 150;
                return Number(d.position) > 150;
            });

            return filteredDemons.length ? String(filteredDemons[0].id) : '';
        }

        function ensureDefaultDemonSelected() {
            if (!isDesktopEmbeddedLayout()) return;

            const selectedId = selectedDemonId || getDefaultSelectedDemonId();
            if (selectedId) setEmbeddedDemon(selectedId);
        }

        function syncEmbeddedLayout() {
            updateHeaderHeightVar();
            ensureStaffFrameLoaded();
            renderDemons();

            if (isDesktopEmbeddedLayout()) {
                ensureDefaultDemonSelected();
            }
        }

        function getYTId(url) {
            if (!url) return null;
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            const match = url.match(regExp);
            return (match && match[2].length === 11) ? match[2] : null;
        }

        function extract100thFrame(url, imgId) {
            if (!url) return;
            const video = document.createElement('video');
            video.src = url;
            video.crossOrigin = 'anonymous';
            video.muted = true;
            video.playsInline = true;

            video.addEventListener('loadedmetadata', () => {
                video.currentTime = 5.0; // ts just takes the frame 5 seconds in as the thumnbail
            });

            video.addEventListener('seeked', () => {
                try {
                    const canvas = document.createElement('canvas');
                    canvas.width = video.videoWidth || 320;
                    canvas.height = video.videoHeight || 180;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                    
                    const img = document.getElementById(imgId);
                    if (img) {
                        img.src = canvas.toDataURL('image/jpeg');
                    }
                } catch (err) {
                    console.error("Could not capture frame due to a CORS restriction or encoding error: ", err);
                }
            });

            video.addEventListener('error', (err) => {
                console.error("Failed to load video thumbnail source:", err);
            });
        }

        function switchListTab(tab) {
            currentListTab = tab;
            document.getElementById('tab-main').classList.toggle('active', tab === 'main');
            document.getElementById('tab-legacy').classList.toggle('active', tab === 'legacy');
            renderDemons();

            if (isDesktopEmbeddedLayout()) {
                const defaultId = getDefaultSelectedDemonId();
                if (defaultId) setEmbeddedDemon(defaultId);
            }
        }

        function renderDemons() {
            const container = document.getElementById('list-container');
            container.innerHTML = '';

            const filteredDemons = allDemons.filter(d => {
                if (currentListTab === 'main') return d.position <= 150;
                return d.position > 150;
            });

            if (filteredDemons.length === 0) {
                container.innerHTML = `<p style="text-align: center; color: var(--text-muted); margin-top: 20px;">No levels currently exist in this section.</p>`;
                return;
            }

            const nonYtVideoQueue = [];

            const htmlContent = filteredDemons.map(demon => {
                const ytId = getYTId(demon.showcase_link);
                let thumbUrl = '/assets/missing-thumbnail.png';
                const imgId = `thumb-${demon.id}`;

                if (ytId) {
                    thumbUrl = `https://img.youtube.com/vi/${ytId}/mqdefault.jpg`;
                } else if (demon.showcase_link) {
                    nonYtVideoQueue.push({ url: demon.showcase_link, id: imgId });
                }

                let sideContentHtml = "";

                if (isImpossibleList) {
                    const records = demon.records || [];
                    const bestPercentage = records.length > 0 
                        ? Math.max(...records.map(r => r.percentage || 0)) 
                        : 0;
                    
                    sideContentHtml = `<div class="wr-badge">WR: ${bestPercentage}%</div>`;
                } else {
                    const fullPoints = 250 * Math.exp(-0.0263 * (demon.position - 1));
                    const reqPoints = fullPoints / 10;
                    let pointsHtml = "";

                    if (demon.position > 75) {
                        pointsHtml = `
                            <span style="color: var(--accent); font-weight: 600;">${fullPoints.toFixed(2)}</span>
                            <span>points</span>
                        `;
                    } else {
                        pointsHtml = `
                            <span style="color: var(--text); font-weight: 600;">${reqPoints.toFixed(2)}</span>
                            <span>(${demon.requirement}%)</span>
                            <span style="margin: 0 4px; opacity: 0.4;">—</span>
                            <span style="color: var(--accent); font-weight: 600;">${fullPoints.toFixed(2)}</span>
                            <span>(100%) points</span>
                        `;
                    }

                    sideContentHtml = `
                        <div class="points-row">
                            ${pointsHtml}
                        </div>
                    `;
                }

                const showPlacement = currentListTab === 'main';
                const showPoints = !isImpossibleList && showPlacement;
                const rankHtml = showPlacement ? `<span class="rank">#${demon.position}</span>` : '';

                const directUrl = getDirectDemonUrl(demon.id);
                const embeddedUrl = getEmbeddedDemonUrl(demon.id);
                const linkAttrs = isDesktopEmbeddedLayout()
                    ? `href="${embeddedUrl}" onclick="selectDemon('${demon.id}'); return false;"`
                    : `href="${directUrl}" target="_blank" rel="noopener"`;

                return `
                    <a ${linkAttrs} style="text-decoration: none; color: inherit; display: block;">
                        <div class="demon-card">
                            <div class="thumbnail-box">
                                <img id="${imgId}" src="${thumbUrl}" alt="${demon.name} thumbnail">
                            </div>
                            <div class="card-body">
                                <div class="card-main-content">
                                    ${rankHtml}
                                    <div class="demon-info">
                                        <span class="b">${demon.name}</span>
                                        <div style="color: var(--text-muted); font-size: 0.85em; margin-top: 4px;">published by ${demon.author}</div>
                                        ${showPoints ? sideContentHtml : ''}
                                    </div>
                                </div>
                                ${isImpossibleList ? sideContentHtml : ''}
                            </div>
                        </div>
                    </a>
                `;
            }).join('');

            container.innerHTML = htmlContent;
            fitLevelCardText();

            nonYtVideoQueue.forEach(item => {
                extract100thFrame(item.url, item.id);
            });
        }

        async function loadDemons() {
            try {
                const response = await fetch('/api/demons');
                allDemons = await response.json();

                const hasLegacy = allDemons.some(d => d.position > 150);
                if (hasLegacy) {
                    document.getElementById('list-tabs-container').style.display = 'flex';
                }

                updateHeaderHeightVar();
                renderDemons();
                ensureStaffFrameLoaded();
                requestAnimationFrame(updateHeaderHeightVar);

                if (isDesktopEmbeddedLayout()) {
                    ensureDefaultDemonSelected();
                }
            } catch (err) {
                console.error(err);
                document.getElementById('list-container').innerHTML = `<p style="color:red; text-align:center;">Failed to load list.</p>`;
            }
        }

        if (desktopLayoutQuery.addEventListener) {
            desktopLayoutQuery.addEventListener('change', syncEmbeddedLayout);
        } else if (desktopLayoutQuery.addListener) {
            desktopLayoutQuery.addListener(syncEmbeddedLayout);
        }


        window.addEventListener('load', () => {
            updateHeaderHeightVar();
            fitLevelCardText();
        });

        window.addEventListener('resize', () => {
            updateHeaderHeightVar();
            fitLevelCardText();
        });

        requestAnimationFrame(() => {
            updateHeaderHeightVar();
            fitLevelCardText();
        });

        initHeaderHeightTracking();
        removeStaleIdParamFromUrl();
        loadDemons();
    </script>
</body>
</html>
