<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submit Record | WBDL</title>
    <link rel="icon" type="image/png" href="/assets/icon.png">
    <link rel="stylesheet" href="/style.css">
<style>
.page-content {
    flex-grow: 1;
    display: grid;
    grid-template-columns: minmax(0, 1fr);
    grid-template-rows: 50px minmax(0, 1fr);
    width: 100%;
    min-height: 100%;
    padding: 10px 10px 60px;
    box-sizing: border-box;
}

.submit-shell {
    position: relative;
    grid-row: 2;
    justify-self: center;
    align-self: center;
    width: 100%;
    max-width: 480px;
}

.submit-box {
    position: relative;
    background: var(--surface);
    padding: 38px;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    width: 100%;
    box-sizing: border-box;
}

.submit-box h2 {
    margin: 0 0 22px 0;
    color: var(--text);
    font-size: 1.6em;
    text-align: center;
}

.rules-note {
    background: var(--bg);
    padding: 14px 16px;
    border-radius: var(--radius-sm);
    font-size: 0.88em;
    color: var(--text-muted);
    margin-bottom: 24px;
    border: 1px solid var(--border);
    line-height: 1.5;
}

.rules-note a {
    color: var(--accent);
    text-decoration: none;
    font-weight: 600;
}

.rules-note a:hover {
    text-decoration: underline;
}

.form-group {
    margin-bottom: 18px;
}

.submit-box label {
    display: block;
    margin-bottom: 8px;
    font-size: 0.78em;
    color: var(--text-muted);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
}

.submit-box input,
.submit-box select {
    width: 100%;
    padding: 13px 14px;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: var(--radius-sm);
    font-size: 1rem;
    font-family: var(--font-body);
    box-sizing: border-box;
    transition: border-color 0.15s, background-color 0.15s, box-shadow 0.15s;
}

.submit-box input:focus,
.submit-box select:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 2px rgba(255, 255, 255, 0.04);
}

.submit-box button {
    width: 100%;
    padding: 14px;
    background: var(--accent);
    border: none;
    color: #000;
    font-family: var(--font-body);
    font-weight: 700;
    cursor: pointer;
    margin-top: 8px;
    border-radius: var(--radius-sm);
    font-size: 1em;
    transition: background-color 0.15s;
}

.submit-box button:hover {
    background: var(--accent-hover);
}

input:-webkit-autofill,
input:-webkit-autofill:hover,
input:-webkit-autofill:focus {
    -webkit-text-fill-color: var(--text);
    -webkit-box-shadow: 0 0 0px 1000px var(--bg) inset;
    transition: background-color 5000s ease-in-out 0s;
}

.tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 22px;
}

.tab {
    flex: 1;
    padding: 11px;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text-muted);
    cursor: pointer;
    text-align: center;
    border-radius: var(--radius-sm);
    font-weight: 600;
    font-size: 0.9em;
    transition: all 0.15s;
}

.tab.active {
    background: var(--accent);
    color: #000;
    border-color: var(--accent);
}

.hidden { display: none !important; }

.form-group span {
    display: block;
    font-size: 0.8em;
    color: var(--text-muted);
    margin-bottom: 8px;
    margin-top: -2px;
    line-height: 1.4;
    font-weight: normal;
    text-transform: none;
    letter-spacing: normal;
}

.gui-trigger-btn {
    cursor: pointer;
    padding: 13px 14px;
    min-height: 48px;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: var(--radius-sm);
    font-size: 1rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
    box-sizing: border-box;
    transition: border-color 0.15s, background-color 0.15s;
}

.gui-trigger-btn:hover {
    border-color: var(--accent);
}

.gui-trigger-btn .trigger-text {
    flex: 1;
    min-width: 0;
    text-align: left;
    line-height: 1.2;
    font-size: 15px;
    transform: translateY(5px);
}

.gui-trigger-btn .trigger-arrow {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 20px;
    flex: 0 0 20px;
    font-size: 0.95em;
    line-height: 1;
    opacity: 0.72;
    transform: translateY(5px);
    user-select: none;
}

.modal-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.7);
    backdrop-filter: blur(4px);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1000;
}

#pending-records-modal {
    background: rgba(0, 0, 0, 0.78);
    backdrop-filter: none;
    -webkit-backdrop-filter: none;
}

.modal-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    width: 90%;
    max-width: 440px;
    padding: 24px;
    box-sizing: border-box;
    display: flex;
    flex-direction: column;
    max-height: 80vh;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

.modal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
}

.modal-header h3 {
    margin: 0;
    font-size: 1.2em;
    color: var(--text);
}

.modal-close-btn {
    background: none;
    border: none;
    color: var(--text-muted);
    font-size: 1.4em;
    cursor: pointer;
    padding: 0;
    line-height: 1;
}

.modal-close-btn:hover {
    color: #ff4444;
}

.modal-search-box {
    margin-bottom: 14px;
}

.modal-search-box input {
    width: 100%;
    padding: 13px 14px;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: var(--radius-sm);
    font-size: 1rem;
    font-family: var(--font-body);
    box-sizing: border-box;
    transition: border-color 0.15s, background-color 0.15s, box-shadow 0.15s;
}

.modal-search-box input:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 2px rgba(255, 255, 255, 0.04);
}

.modal-level-list {
    overflow-y: auto;
    flex-grow: 1;
    display: flex;
    flex-direction: column;
    gap: 6px;

    scrollbar-width: thin;
    scrollbar-color: rgba(255, 255, 255, 0.22) transparent;
}

.modal-level-list::-webkit-scrollbar {
    width: 10px;
}

.modal-level-list::-webkit-scrollbar-track {
    background: transparent;
    margin: 4px 0;
}

.modal-level-list::-webkit-scrollbar-thumb {
    background: rgba(255, 255, 255, 0.18);
    border: 2px solid transparent;
    border-radius: 999px;
    background-clip: padding-box;
}

.modal-level-list::-webkit-scrollbar-thumb:hover {
    background: rgba(255, 255, 255, 0.28);
    border: 2px solid transparent;
    background-clip: padding-box;
}

.modal-level-item {
    padding: 12px 14px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
}

.modal-level-item:hover {
    border-color: var(--accent);
    background: var(--surface-2);
}

.modal-level-item .level-title {
    font-weight: 600;
    color: var(--text);
    min-width: 0;
}

.modal-level-item .level-meta {
    font-size: 0.82em;
    color: var(--text-muted);
    white-space: nowrap;
}

.pending-settings-row {
    grid-row: 1;
    width: 100vw;
    height: 50px;
    margin-left: calc(50% - 50vw);
    padding-right: 10px;
    box-sizing: border-box;
    display: flex;
    justify-content: flex-end;
    align-items: flex-start;
}

.pending-settings-btn {
    position: static;
    width: 50px !important;
    height: 50px;
    min-height: 0;
    margin: 0 !important;
    padding: 0 !important;
    border: 0 !important;
    border-radius: 0 !important;
    background: transparent !important;
    box-shadow: none !important;
    appearance: none;
    -webkit-appearance: none;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
}

.pending-settings-btn:hover,
.pending-settings-btn:active,
.pending-settings-btn:focus {
    border: 0 !important;
    background: transparent !important;
    box-shadow: none !important;
}

.pending-settings-btn:focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 3px;
}

.pending-settings-btn img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
    pointer-events: none;
}

.pending-record-list {
    overflow-y: auto;
    display: grid;
    gap: 12px;
}

.pending-record-card {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 14px;
}

.pending-record-card h4 { margin: 0 0 12px; color: var(--text); }
.pending-record-grid { display: grid; grid-template-columns: 110px 1fr; gap: 10px; }
.pending-record-card label { color: var(--text-muted); font-size: 0.75rem; text-transform: uppercase; }
.pending-record-card input,
.pending-record-card select {
    width: 100%;
    box-sizing: border-box;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: var(--radius-sm);
    padding: 9px 10px;
    font: inherit;
}
.pending-record-actions {
    display: flex;
    justify-content: flex-end;
    gap: 10px;
    margin-top: 16px;
}

.pending-record-actions button {
    flex: 0 1 120px;
    width: auto;
    min-height: 40px;
    margin: 0;
    padding: 10px 16px;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    font: inherit;
    font-weight: 700;
    cursor: pointer;
    transition: background-color 0.15s, border-color 0.15s, color 0.15s;
}

.pending-record-actions .save-pending {
    background: var(--accent);
    border-color: var(--accent);
    color: #000;
}

.pending-record-actions .save-pending:hover {
    background: var(--accent-hover);
    border-color: var(--accent-hover);
}

.pending-record-actions .delete-pending {
    background: transparent;
    border-color: rgba(255, 68, 68, 0.6);
    color: #ff6b6b;
}

.pending-record-actions .delete-pending:hover {
    background: var(--danger);
    border-color: var(--danger);
    color: #fff;
}

@media (max-width: 560px) {
    .submit-box { padding: 34px 22px 28px; }
    .pending-record-grid { grid-template-columns: 1fr; }
}

</style>
</head>
<body>

    <div id="global-nav"></div>

<main class="page-content">
    <div class="pending-settings-row">
        <button type="button" class="pending-settings-btn" onclick="openPendingRecords()" aria-label="Edit pending records" title="Edit pending records">
            <img src="/assets/settings-uhd.png" alt="">
        </button>
    </div>
    <div class="submit-shell">
        <div class="submit-box">
        <div class="tabs">
            <div class="tab active" id="tab-progress" onclick="switchTab('progress')">Level Progress</div>
            <div class="tab" id="tab-verif" onclick="switchTab('verif')">Verification</div>
        </div>

        <h2 id="form-title">Submit Record</h2>
        
        <div class="rules-note">
            Please ensure your record follows the 
            <a href="/guidelines" target="_blank">guidelines</a> 
            before submitting.
        </div>

        <div id="form-progress">
            <div class="form-group">
                <label>Level</label>
                <div id="demon-select-trigger" class="gui-trigger-btn" onclick="openLevelModal()">
                    <span id="selected-level-text" class="trigger-text">Loading levels...</span>
                    <span class="trigger-arrow">▼</span>
                </div>
                <input type="hidden" id="demon-select" value="">
            </div>
            <div class="form-group">
                <label for="percentage">Percentage</label>
                <input type="number" id="percentage" placeholder="e.g. 50" min="1" max="100" oninput="clampPercentageInput(this); updateEnjoymentVisibility()">
            </div>
            <div class="form-group hidden" id="enjoyment-group">
                <label for="enjoyment-rating">Enjoyment rating (optional)</label>
                <select id="enjoyment-rating">
                    <option value="">Not rated</option>
                    <option value="1">1 / 10</option>
                    <option value="2">2 / 10</option>
                    <option value="3">3 / 10</option>
                    <option value="4">4 / 10</option>
                    <option value="5">5 / 10</option>
                    <option value="6">6 / 10</option>
                    <option value="7">7 / 10</option>
                    <option value="8">8 / 10</option>
                    <option value="9">9 / 10</option>
                    <option value="10">10 / 10</option>
                </select>
            </div>
        </div>

        <div id="form-verif" class="hidden">
            <div class="form-group">
                <label>Level Name</label>
                <input type="text" id="v-name" placeholder="e.g. 1st Level">
            </div>
            <div class="form-group">
                <label>Level Creator</label>
                <input type="text" id="v-author" placeholder="e.g. MindCap">
            </div>
            <div class="form-group">
                <label>Level ID</label>
                <input type="number" id="v-id" placeholder="e.g. 57436521">
            </div>
            <div class="form-group">
                <label>Personal Placement #</label>
                <span>This likely won't be the final placement, but we do take this into consideration.</span>
                <input type="number" id="v-opinion" placeholder="e.g. 100" min="1" max="150" oninput="if(parseInt(this.value) > 150) this.value = 150;">
            </div>
        </div>

        <div class="form-group">
            <label for="video-url" id="video-url-label">Video URL</label>
            <input type="text" id="video-url" placeholder="https://youtube.com/watch?v=...">
        </div>

        <button onclick="handleFormSubmit()">Submit</button>
        </div>
    </div>
</main>

<div id="level-modal" class="modal-overlay hidden">
    <div class="modal-box">
        <div class="modal-header">
            <h3>Select level</h3>
            <button class="modal-close-btn" onclick="closeLevelModal()">&times;</button>
        </div>
        <div class="modal-search-box">
            <input type="text" id="modal-search" placeholder="Type level name or position..." oninput="filterModalLevels()">
        </div>
        <div id="modal-level-list" class="modal-level-list"></div>
    </div>
</div>

<div id="pending-records-modal" class="modal-overlay hidden">
    <div class="modal-box" style="max-width: 680px;">
        <div class="modal-header">
            <h3>Your Pending Records</h3>
            <button class="modal-close-btn" onclick="closePendingRecords()">&times;</button>
        </div>
        <div id="pending-record-list" class="pending-record-list">
            <p style="color: var(--text-muted);">Loading...</p>
        </div>
    </div>
</div>

    <script src="/nav.js"></script>
<script>
    let demonList = [];
    let currentTab = 'progress';
    const isImpossibleList = window.location.hostname.includes('impossible');

    function setupListLabels() {
        const verifTab = document.getElementById('tab-verif');
        if (isImpossibleList && verifTab) {
            verifTab.innerText = "New Level";
        }
    }

    function updateUrlLabel() {
        const urlLabel = document.getElementById('video-url-label');
        if (!urlLabel) return;

        if (currentTab === 'progress') {
            urlLabel.innerText = "Video URL";
        } else {
            if (isImpossibleList) {
                urlLabel.innerText = "Showcase URL";
            } else {
                urlLabel.innerText = "Verification URL";
            }
        }
    }

    if (isImpossibleList) {
        document.body.classList.add('impossible-list');
    }
    
    setupListLabels();
    updateUrlLabel();

    function switchTab(type) {
        currentTab = type;
        
        document.getElementById('tab-progress').classList.toggle('active', type === 'progress');
        document.getElementById('tab-verif').classList.toggle('active', type === 'verif');
        
        document.getElementById('form-progress').classList.toggle('hidden', type !== 'progress');
        document.getElementById('form-verif').classList.toggle('hidden', type !== 'verif');
        
        if (type === 'progress') {
            document.getElementById('form-title').innerText = "Submit Record";
        } else {
            document.getElementById('form-title').innerText = isImpossibleList ? "Submit New Level" : "Submit Verification";
        }
        
        updateUrlLabel();
        updateEnjoymentVisibility();
    }

    async function checkAccess() {
        try {
            const res = await fetch('/api/me');
            const user = await res.json();
            if (!user.loggedIn) {
                alert("You must be logged in to submit records!");
                window.location.href = "/login";
                return;
            }
            loadDemons();
        } catch (err) {
            console.error("Auth check failed");
        }
    }

    async function loadDemons() {
        try {
            const res = await fetch('/api/demons');
            const allDemons = await res.json();
            
            demonList = allDemons.filter(d => d.position <= 150);
            
            const selectText = document.getElementById('selected-level-text');
            if (demonList.length > 0) {
                selectText.innerText = "Select level...";
            } else {
                selectText.innerText = "No levels available";
            }
        } catch (err) {
            console.error("Failed to load demons");
            document.getElementById('selected-level-text').innerText = "Error loading levels";
        }
    }

    function openLevelModal() {
        if (demonList.length === 0) return;
        document.getElementById('level-modal').classList.remove('hidden');
        document.getElementById('modal-search').value = "";
        document.getElementById('modal-search').focus();
        renderModalRows(demonList);
    }

    function closeLevelModal() {
        document.getElementById('level-modal').classList.add('hidden');
    }

    function renderModalRows(listItems) {
        const container = document.getElementById('modal-level-list');
        if (listItems.length === 0) {
            container.innerHTML = `<p style="text-align:center; color: var(--text-muted); font-size: 0.9em; padding: 15px;">No levels match your search.</p>`;
            return;
        }

        container.innerHTML = listItems.map(d => {
            let statusText = "";
            if (!isImpossibleList) {
                statusText = d.position > 75 ? "Extended" : `Min: ${d.requirement}%`;
            }
            const metaDisplay = isImpossibleList ? `by ${d.author}` : `${statusText}`;

            return `
                <div class="modal-level-item" onclick="selectModalLevel(${d.id}, '${d.name}', ${d.position})">
                    <span class="level-title">#${d.position} - ${d.name}</span>
                    <span class="level-meta">${metaDisplay}</span>
                </div>
            `;
        }).join('');
    }

    function filterModalLevels() {
        const query = document.getElementById('modal-search').value.toLowerCase().trim();
        const matches = demonList.filter(d => 
            d.name.toLowerCase().includes(query) || 
            d.author.toLowerCase().includes(query) ||
            `#${d.position}`.includes(query)
        );
        renderModalRows(matches);
    }

    function selectModalLevel(id, name, position) {
        document.getElementById('demon-select').value = id;
        document.getElementById('selected-level-text').innerText = `#${position} - ${name}`;
        closeLevelModal();
        updatePercentageField();
    }

    async function handleFormSubmit() {
        const videoUrl = document.getElementById('video-url').value;

        if (!videoUrl) return alert("Please provide a video URL.");
        if (!videoUrl.startsWith("http")) {
            return alert("Please enter a valid URL (starting with http:// or https://)");
        }

        if (currentTab === 'progress') {
            await submitStandardRecord(videoUrl);
        } else {
            await submitVerification(videoUrl);
        }
    }

    async function submitStandardRecord(videoUrl) {
        const demonId = document.getElementById('demon-select').value;
        if (!demonId) return alert("Please select a level first from the picker menu.");
        
        const percentage = parseInt(document.getElementById('percentage').value);
        if (!percentage) return alert("Please enter a percentage.");

        const selectedDemon = demonList.find(d => d.id == demonId);
        if (percentage < selectedDemon.requirement) {
            return alert(`This level requires at least ${selectedDemon.requirement}% for a record!`);
        }

        const enjoymentRating = percentage === 100
            ? document.getElementById('enjoyment-rating').value
            : '';

        const res = await fetch('/api/submit', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ demonId, percentage, videoUrl, enjoymentRating })
        });

        const data = await res.json();
        if (res.ok) {
            alert("Record submitted for review! It will appear on the list once a list moderator approves it.");
            window.location.reload();
        } else {
            alert(data.error || "Submission failed.");
        }
    }

    async function submitVerification(videoUrl) {
        const name = document.getElementById('v-name').value;
        const author = document.getElementById('v-author').value;
        const levelId = document.getElementById('v-id').value;
        const opinion = parseInt(document.getElementById('v-opinion').value);

        if (!name || !author || !levelId || !opinion) {
            return alert("Please fill in all required fields.");
        }

        if (opinion > 150 || opinion < 1) {
            return alert("You cannot submit verifications for placements outside the top 150 (Legacy List).");
        }

        const res = await fetch('/api/submit-verification', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name, author, levelId, opinion, videoUrl })
        });

        const data = await res.json();
        if (res.ok) {
            alert("Submitted for review! The level will be added on the list once a list admin approves it.");
            window.location.reload();
        } else {
            alert(data.error || "Submission failed.");
        }
    }

    function updatePercentageField() {
        const demonId = document.getElementById('demon-select').value;
        if (!demonId) return;

        const percentInput = document.getElementById('percentage');
        const selectedDemon = demonList.find(d => d.id == demonId);

        if (selectedDemon && selectedDemon.position > 75) {
            percentInput.value = 100;
            percentInput.readOnly = true;
            percentInput.style.opacity = "0.6";
            percentInput.style.cursor = "not-allowed";
        } else {
            percentInput.readOnly = false;
            percentInput.style.opacity = "1";
            percentInput.style.cursor = "text";
            if (percentInput.value == 100) percentInput.value = ""; 
        }
        updateEnjoymentVisibility();
    }

    function clampPercentageInput(input) {
        if (input.value === '') return;
        const value = Number(input.value);
        if (Number.isFinite(value) && value > 100) input.value = '100';
    }

    function updateEnjoymentVisibility() {
        const group = document.getElementById('enjoyment-group');
        const select = document.getElementById('enjoyment-rating');
        const percentage = parseInt(document.getElementById('percentage').value, 10);
        const show = currentTab === 'progress' && percentage === 100;
        group.classList.toggle('hidden', !show);
        if (!show) select.value = '';
    }

    function escapeHtml(value) {
        return String(value ?? '')
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#39;');
    }

    function closePendingRecords() {
        document.getElementById('pending-records-modal').classList.add('hidden');
    }

    async function openPendingRecords() {
        const modal = document.getElementById('pending-records-modal');
        const list = document.getElementById('pending-record-list');
        modal.classList.remove('hidden');
        list.innerHTML = '<p style="color: var(--text-muted);">Loading...</p>';

        try {
            const res = await fetch('/api/records/pending');
            const data = await res.json();
            if (!res.ok) throw new Error(data.error || 'Could not load pending records.');
            renderPendingRecords(data);
        } catch (err) {
            list.innerHTML = `<p style="color: var(--danger);">${escapeHtml(err.message)}</p>`;
        }
    }

    function renderPendingRecords(records) {
        const list = document.getElementById('pending-record-list');
        if (!Array.isArray(records) || !records.length) {
            list.innerHTML = '<p style="color: var(--text-muted);">You have no records awaiting moderator review.</p>';
            return;
        }

        list.innerHTML = records.map(record => {
            const ratingOptions = ['<option value="">Not rated</option>']
                .concat(Array.from({ length: 10 }, (_, i) => {
                    const value = i + 1;
                    return `<option value="${value}" ${Number(record.enjoyment_rating) === value ? 'selected' : ''}>${value} / 10</option>`;
                })).join('');
            const showRating = Number(record.percentage) === 100;

            return `
                <div class="pending-record-card" id="pending-card-${record.id}">
                    <h4>#${escapeHtml(record.position)} - ${escapeHtml(record.demon_name)}</h4>
                    <div class="pending-record-grid">
                        <label for="pending-percent-${record.id}">Percentage</label>
                        <input id="pending-percent-${record.id}" type="number" min="1" max="100" value="${escapeHtml(record.percentage)}" oninput="clampPercentageInput(this); updatePendingEnjoymentVisibility(${record.id})">
                        <label for="pending-url-${record.id}">Video URL</label>
                        <input id="pending-url-${record.id}" type="url" value="${escapeHtml(record.video_url)}">
                        <label id="pending-rating-label-${record.id}" for="pending-rating-${record.id}" class="${showRating ? '' : 'hidden'}">Enjoyment</label>
                        <select id="pending-rating-${record.id}" class="${showRating ? '' : 'hidden'}">${ratingOptions}</select>
                    </div>
                    <div class="pending-record-actions">
                        <button type="button" class="save-pending" onclick="savePendingRecord(${record.id})">Save</button>
                        <button type="button" class="delete-pending" onclick="deletePendingRecord(${record.id})">Cancel</button>
                    </div>
                </div>
            `;
        }).join('');
    }

    function updatePendingEnjoymentVisibility(recordId) {
        const percentage = parseInt(document.getElementById(`pending-percent-${recordId}`).value, 10);
        const label = document.getElementById(`pending-rating-label-${recordId}`);
        const select = document.getElementById(`pending-rating-${recordId}`);
        const show = percentage === 100;
        label.classList.toggle('hidden', !show);
        select.classList.toggle('hidden', !show);
        if (!show) select.value = '';
    }

    async function savePendingRecord(recordId) {
        const percentage = parseInt(document.getElementById(`pending-percent-${recordId}`).value, 10);
        const videoUrl = document.getElementById(`pending-url-${recordId}`).value.trim();
        const enjoymentRating = percentage === 100
            ? document.getElementById(`pending-rating-${recordId}`).value
            : '';
        const res = await fetch(`/api/records/pending/${recordId}`, {
            method: 'PATCH',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ percentage, videoUrl, enjoymentRating })
        });
        const data = await res.json();
        alert(res.ok ? data.message : (data.error || 'Could not update record.'));
        if (res.ok) openPendingRecords();
    }

    async function deletePendingRecord(recordId) {
        if (!confirm('Canel this submission?')) return;
        const res = await fetch(`/api/records/pending/${recordId}`, { method: 'DELETE' });
        const data = await res.json();
        alert(res.ok ? data.message : (data.error || 'Could not cancel record.'));
        if (res.ok) openPendingRecords();
    }

    window.onclick = function(event) {
        const levelOverlay = document.getElementById('level-modal');
        const pendingOverlay = document.getElementById('pending-records-modal');
        if (event.target === levelOverlay) closeLevelModal();
        if (event.target === pendingOverlay) closePendingRecords();
    }

    checkAccess();
</script>
</body>
</html>
