<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moderators | WBDL</title>
    <link rel="icon" type="image/png" href="/assets/icon.png">
    <link rel="stylesheet" href="/style.css">
<style>
    .page-content {
        max-width: 980px;
        margin: 0 auto;
        padding: 50px 20px;
        overflow-x: auto;
    }

    h2 {
        border-bottom: 1px solid var(--border);
        padding: 0 60px 16px 0;
        margin: 0 0 22px;
        font-size: 1.5em;
    }

    .box {
        position: relative;
        background: var(--surface);
        padding: 26px;
        border-radius: var(--radius);
        border: 1px solid var(--border);
        min-height: 600px;
        min-width: 800px;
        display: flex;
        flex-direction: column;
        width: 100%;
        box-sizing: border-box;
    }

    #pending-records {
        flex-grow: 1;
    }

    .item-card {
        background: var(--bg);
        padding: 18px 20px;
        border-radius: var(--radius-sm);
        margin-bottom: 12px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        border: 1px solid var(--border);
        gap: 16px;
        flex-wrap: wrap;
    }

    .item-card:hover {
        background: var(--surface-2);
    }

    .item-card .b { color: var(--accent); font-size: 1.1em; }

    button {
        padding: 11px 22px;
        border: none;
        border-radius: var(--radius-sm);
        font-family: var(--font-body);
        font-weight: 700;
        cursor: pointer;
        transition: background-color 0.15s, opacity 0.15s;
    }

    .btn-accept { background: var(--accent); color: #000; margin-right: 8px; }
    .btn-accept:hover { background: var(--accent-hover); }
    .btn-reject { background: transparent; border: 1px solid var(--danger); color: var(--danger); }
    .btn-reject:hover { background: var(--danger); color: #fff; }

    .video-link {
        color: var(--text-muted);
        text-decoration: none;
        font-size: 0.9em;
        display: inline-block;
        margin-top: 6px;
    }
    .video-link:hover { color: var(--accent); }


    .moderator-options-btn {
        position: absolute;
        top: 12px;
        right: 12px;
        width: 50px;
        height: 50px;
        min-height: 0;
        margin: 0;
        padding: 0;
        border: 0;
        border-radius: 0;
        background: transparent;
        box-shadow: none;
        appearance: none;
        -webkit-appearance: none;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
    }

    .moderator-options-btn:hover,
    .moderator-options-btn:active,
    .moderator-options-btn:focus {
        border: 0;
        background: transparent;
        box-shadow: none;
    }

    .moderator-options-btn:focus-visible {
        outline: 2px solid var(--accent);
        outline-offset: 3px;
    }

    .moderator-options-btn img {
        width: 100%;
        height: 100%;
        object-fit: contain;
        display: block;
        pointer-events: none;
    }

    .notification-options-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.78);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 1000;
        padding: 20px;
        box-sizing: border-box;
    }

    .notification-options-overlay.hidden {
        display: none;
    }

    .notification-options-box {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        width: 90%;
        max-width: 440px;
        padding: 24px;
        box-sizing: border-box;
        box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    .notification-options-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 18px;
    }

    .notification-options-header h3 {
        margin: 0;
        font-size: 1.2em;
        color: var(--text);
    }

    .notification-options-close {
        background: none;
        border: none;
        color: var(--text-muted);
        font-size: 1.4em;
        cursor: pointer;
        padding: 0;
        line-height: 1;
    }

    .notification-options-close:hover {
        color: #ff4444;
    }

    .notification-settings {
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        gap: 8px;
    }

    .notification-toggle {
        width: auto;
        min-height: 28px;
        padding: 0;
        margin: 0;
        border: none;
        border-radius: 0;
        background: transparent;
        color: var(--text);
        display: inline-flex;
        align-items: center;
        justify-content: flex-start;
        gap: 7px;
        font-family: var(--font-body);
        font-weight: 900;
        line-height: 1;
        box-shadow: none;
    }

    .notification-toggle:hover,
    .notification-toggle:focus,
    .notification-toggle:active {
        background: transparent;
    }

    .notification-toggle img {
        width: 28px;
        height: 28px;
        min-width: 28px;
        min-height: 28px;
        max-width: 28px;
        max-height: 28px;
        object-fit: contain;
        image-rendering: auto;
        pointer-events: none;
        display: block;
        flex: 0 0 28px;
        transition: transform 0.16s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .notification-toggle:active img {
        transform: scale(1.1);
        transition: transform 0.08s ease-out;
    }

    .notification-toggle span {
        pointer-events: none;
        user-select: none;
    }

    .notification-settings-message {
        min-height: 1.2em;
        color: var(--text-muted);
        font-size: 0.82rem;
        margin-left: 35px;
    }
</style>
</head>
<body>
    <div id="global-nav"></div>
    <main class="page-content">
        <section class="box">
            <button type="button" class="moderator-options-btn" onclick="openNotificationOptions()" aria-label="Submission notification options" title="Options">
                <img src="/assets/settings-uhd.png" alt="">
            </button>
            <h2>Pending Submissions</h2>
            <div id="pending-records">Checking for new records...</div>
        </section>
    </main>

    <div id="notification-options-modal" class="notification-options-overlay hidden" aria-hidden="true">
        <div class="notification-options-box" role="dialog" aria-modal="true" aria-labelledby="notification-options-title">
            <div class="notification-options-header">
                <h3 id="notification-options-title">Options</h3>
                <button type="button" class="notification-options-close" onclick="closeNotificationOptions()" aria-label="Close">&times;</button>
            </div>
            <div class="notification-settings" aria-label="Submission notification settings">
                <button type="button" id="submission-notifications-toggle" class="notification-toggle" onclick="toggleSubmissionNotifications()" aria-pressed="false">
                    <img id="submission-notifications-image" src="/assets/GJ_checkOff_001.png" alt="Submission Notifications off">
                    <span>Submission notifications</span>
                </button>
                <button type="button" id="discord-ping-toggle" class="notification-toggle" onclick="toggleDiscordPing()" aria-pressed="false" hidden>
                    <img id="discord-ping-image" src="/assets/GJ_checkOff_001.png" alt="Discord Ping off">
                    <span>Discord Ping</span>
                </button>
                <div id="notification-settings-message" class="notification-settings-message" aria-live="polite"></div>
            </div>
        </div>
    </div>

    <script src="/nav.js"></script>
    <script>
        const notificationSettings = {
            submissionNotifications: false,
            discordPing: false,
            discordLinked: false,
            saving: false,
        };

        function openNotificationOptions() {
            const modal = document.getElementById('notification-options-modal');
            modal.classList.remove('hidden');
            modal.setAttribute('aria-hidden', 'false');
        }

        function closeNotificationOptions() {
            const modal = document.getElementById('notification-options-modal');
            modal.classList.add('hidden');
            modal.setAttribute('aria-hidden', 'true');
        }

        function updateCheckbox(buttonId, imageId, enabled, label) {
            const button = document.getElementById(buttonId);
            const image = document.getElementById(imageId);
            button.setAttribute('aria-pressed', enabled ? 'true' : 'false');
            image.src = enabled ? '/assets/GJ_checkOn_001.png' : '/assets/GJ_checkOff_001.png';
            image.alt = `${label} ${enabled ? 'on' : 'off'}`;
        }

        function renderNotificationSettings() {
            updateCheckbox(
                'submission-notifications-toggle',
                'submission-notifications-image',
                notificationSettings.submissionNotifications,
                'Submission Notifications'
            );
            updateCheckbox(
                'discord-ping-toggle',
                'discord-ping-image',
                notificationSettings.discordPing,
                'Discord Ping'
            );

            const discordToggle = document.getElementById('discord-ping-toggle');
            discordToggle.hidden = !notificationSettings.discordLinked;
            document.getElementById('submission-notifications-toggle').disabled = notificationSettings.saving;
            discordToggle.disabled = notificationSettings.saving;
        }

        async function loadNotificationSettings() {
            try {
                const response = await fetch('/api/moderation/submission-notification-settings');
                const data = await response.json().catch(() => ({}));
                if (!response.ok) throw new Error(data.error || 'Could not load notification settings.');

                notificationSettings.submissionNotifications = Boolean(data.submissionNotifications);
                notificationSettings.discordPing = Boolean(data.discordPing);
                notificationSettings.discordLinked = Boolean(data.discordLinked);
                renderNotificationSettings();
            } catch (err) {
                document.getElementById('notification-settings-message').textContent = err.message;
            }
        }

        async function saveNotificationSettings(previous) {
            notificationSettings.saving = true;
            renderNotificationSettings();
            const message = document.getElementById('notification-settings-message');
            message.textContent = '';

            try {
                const response = await fetch('/api/moderation/submission-notification-settings', {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        submissionNotifications: notificationSettings.submissionNotifications,
                        discordPing: notificationSettings.discordPing,
                    }),
                });
                const data = await response.json().catch(() => ({}));
                if (!response.ok) throw new Error(data.error || 'Could not save notification settings.');

                notificationSettings.submissionNotifications = Boolean(data.submissionNotifications);
                notificationSettings.discordPing = Boolean(data.discordPing);
                notificationSettings.discordLinked = Boolean(data.discordLinked);
            } catch (err) {
                Object.assign(notificationSettings, previous);
                message.textContent = err.message;
            } finally {
                notificationSettings.saving = false;
                renderNotificationSettings();
            }
        }

        function toggleSubmissionNotifications() {
            if (notificationSettings.saving) return;
            const previous = { ...notificationSettings };
            notificationSettings.submissionNotifications = !notificationSettings.submissionNotifications;
            renderNotificationSettings();
            saveNotificationSettings(previous);
        }

        function toggleDiscordPing() {
            if (notificationSettings.saving || !notificationSettings.discordLinked) return;
            const previous = { ...notificationSettings };
            notificationSettings.discordPing = !notificationSettings.discordPing;
            renderNotificationSettings();
            saveNotificationSettings(previous);
        }

        async function loadPending() {
            const res = await fetch('/api/admin/pending');
            if (!res.ok) {
                document.body.innerHTML = `<h1 style="text-align:center; margin-top:50px; color:red;">Unauthorized</h1>`;
                return;
            }
            const records = await res.json();
            const container = document.getElementById('pending-records');
            if (records.length === 0) {
                container.innerHTML = "<p style='color:#666; text-align:center;'>No pending records! Yay :)</p>";
                return;
            }
            container.innerHTML = records.map(rec => `
                <div class="item-card">
                    <div>
                        <a href="/profile?user=${rec.username}" 
               style="color: var(--accent); text-decoration: none; font-weight: bold; font-size: 1.1em;">
               ${rec.username}
            </a><br>
                        <span>${rec.demon_name} (${rec.percentage}%)</span><br>
                        ${rec.enjoyment_rating ? `<span style="color:var(--text-muted);font-size:0.86em;">Enjoyment: ${rec.enjoyment_rating}/10</span><br>` : ''}
                        <a href="${rec.video_url}" target="_blank" class="video-link">View Video</a>
                    </div>
                    <div>
                        <button class="btn-accept" onclick="updateStatus(${rec.id}, 'accepted')">Accept</button>
                        <button class="btn-reject" onclick="updateStatus(${rec.id}, 'rejected')">Deny</button>
                    </div>
                </div>
            `).join('');
        }

async function updateStatus(recordId, status) {
    let reason = status === 'rejected' ? prompt("Reason for rejection:") : null;
    
    if (status === 'rejected' && reason === null) return;

    try {
        const res = await fetch('/api/admin/update-record', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ recordId, status, reason })
        });

        const data = await res.json();

        if (res.ok) {
            alert(`Record ${status} successfully.`);
            loadPending();
        } else {
            alert("Error: " + (data.error || "Failed to update record."));
        }
    } catch (err) {
        console.error("Fetch error:", err);
        alert("A network error occurred. Check console for details.");
    }
}
        document.getElementById('notification-options-modal').addEventListener('click', event => {
            if (event.target === event.currentTarget) closeNotificationOptions();
        });

        document.addEventListener('keydown', event => {
            if (event.key === 'Escape') closeNotificationOptions();
        });

        loadNotificationSettings();
        loadPending();
    </script>
</body>
</html>
