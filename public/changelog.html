<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Changelog | WBDL</title>
    <link rel="icon" type="image/png" href="/assets/icon.png">
    <link rel="stylesheet" href="/style.css">
    <style>
        .page-content { max-width: 760px; margin: 0 auto; padding: 50px 20px; flex: 1 0 auto; }

        h1 { margin-bottom: 30px; color: var(--text); font-size: 2.4em; }

        .changelog-feed {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .log-item {
            background: var(--surface);
            padding: 18px 22px;
            border-radius: var(--radius);
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: background 0.15s, border-color 0.15s;
            border: 1px solid var(--border);
        }

        .log-item:hover {
            background: var(--surface-2);
            border-color: #3a414a;
        }

        .log-content {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .log-indicator {
            width: 9px;
            height: 9px;
            border-radius: 50%;
            flex-shrink: 0;
            background: var(--text-muted);
        }

        .text-added .log-indicator { background: var(--accent); }
        .text-moved .log-indicator { background: var(--text-muted); }
        .text-deleted .log-indicator { background: var(--danger); }

        .log-text { font-size: 1em; color: var(--text-muted); line-height: 1.4; }
        .log-text .b { color: var(--text); font-weight: 700; }

        .level-name-link {
            color: var(--text);
            font-weight: 700;
            text-decoration: none;
            transition: color 0.15s;
        }

        .level-name-link:hover {
            color: var(--accent);
        }

        .log-date {
            font-size: 0.85em;
            color: var(--text-faint);
            white-space: nowrap;
            margin-left: 20px;
        }

        @media (max-width: 600px) {
            .log-item { flex-direction: column; align-items: flex-start; gap: 10px; }
            .log-date { margin-left: 0; }
        }
    </style>
</head>
<body>
    <div id="global-nav"></div>

    <main class="page-content">
        <h1>Changelog</h1>
        <div id="changelog-container" class="changelog-feed"></div>
    </main>

    <script src="/nav.js"></script>
    <script>
        const isImpossibleList = window.location.hostname.includes('impossible');

        if (isImpossibleList) {
            document.body.classList.add('impossible-list');
        }

        function escapeHtml(str) {
            return String(str ?? '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function getLogClass(changeType) {
            if (changeType === 'added') return 'text-added';
            if (changeType === 'moved') return 'text-moved';
            if (changeType === 'deleted') return 'text-deleted';
            return '';
        }

        function getLevelNameHtml(log) {
            const safeName = escapeHtml(log.demonName || 'Unknown Level');

            if (log.demonId !== undefined && log.demonId !== null && log.demonId !== '') {
                return `<a href="/demon/${encodeURIComponent(log.demonId)}" class="level-name-link">${safeName}</a>`;
            }

            return `<span class="b">${safeName}</span>`;
        }

        function getLogText(log) {
            const levelName = getLevelNameHtml(log);

            if (log.changeType === 'added') {
                return `${levelName} was placed at <span class="b">#${escapeHtml(log.newPosition)}</span>`;
            }

            if (log.changeType === 'moved') {
                return `${levelName} was moved from <span class="b">#${escapeHtml(log.oldPosition)}</span> to <span class="b">#${escapeHtml(log.newPosition)}</span>`;
            }

            if (log.changeType === 'deleted') {
                return `${levelName} was removed from the list`;
            }

            return `${levelName} was updated`;
        }

        async function loadChangelog() {
            try {
                const res = await fetch('/api/changelog');
                const logs = await res.json();
                const container = document.getElementById('changelog-container');

                if (!Array.isArray(logs) || logs.length === 0) {
                    container.innerHTML = "<p style='color: #666;'>No recent changes recorded.</p>";
                    return;
                }

                container.innerHTML = logs.map(log => {
                    const date = new Date(log.date).toLocaleDateString(undefined, {
                        month: 'short',
                        day: 'numeric',
                        year: 'numeric'
                    });

                    return `
                        <div class="log-item ${getLogClass(log.changeType)}">
                            <div class="log-content">
                                <div class="log-indicator"></div>
                                <div class="log-text">${getLogText(log)}</div>
                            </div>
                            <div class="log-date">${date}</div>
                        </div>
                    `;
                }).join('');
            } catch (err) {
                console.error("Failed to load changelog:", err);
            }
        }

        loadChangelog();
    </script>
</body>
</html>
