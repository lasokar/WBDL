<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Level Info | WBDL</title>
    <link rel="icon" type="image/png" href="/assets/icon.png">
    <link rel="stylesheet" href="/style.css">
    <style>
        .page-content {
            flex: 1 0 auto;
            width: 100%;
            max-width: 880px;
            margin: 0 auto;
            padding: 50px 20px 75px;
            box-sizing: border-box;
        }

        .video-container {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            overflow: hidden;
            background: #000;
            border-radius: var(--radius);
            margin-bottom: 30px;
        }
        .video-container iframe {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0;
        }

        .info-header { margin-bottom: 30px; border-bottom: 1px solid var(--border); padding-bottom: 24px; }
        .info-header h1 { color: var(--accent); margin: 0; font-size: 2.2em; }
        .info-header p { color: var(--text-muted); }
        #level-id-tag {
            background: var(--surface-2);
            padding: 3px 10px;
            border-radius: var(--radius-sm);
            font-size: 0.85em;
            color: var(--text-muted);
        }

        .legacy-warning {
            display: none;
            margin-bottom: 22px;
            padding: 14px 18px;
            border: 1px solid #f1c40f;
            border-radius: var(--radius-sm);
            background: rgba(241, 196, 15, 0.16);
            color: #ffd866;
            font-weight: 700;
            text-align: center;
        }

        #play-link {
            display: inline-block;
            margin-top: 18px;
            padding: 11px 22px;
            background: var(--accent);
            color: #000;
            text-decoration: none;
            font-weight: 700;
            border-radius: var(--radius-sm);
            transition: background 0.15s;
        }
        #play-link:hover {
            background: var(--accent-hover);
        }

        .verifier-row {
            margin: -8px 0 24px;
            text-align: center;
            color: var(--text);
            font-weight: 400;
            font-size: 1.2em;
        }

        .verifier-row a {
            color: var(--text);
            text-decoration: none;
            font-weight: 700;
        }

        .verifier-row a:hover {
            color: var(--accent);
        }

        .not-found-card {
            text-align: center;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 46px 24px;
        }

        .not-found-card h1 {
            color: #ff4444;
            margin: 0 0 12px;
            font-size: 2.2em;
        }

        .not-found-card p {
            color: var(--text-muted);
        }

        .record-row {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 18px; background: var(--surface); margin-bottom: 8px; border-radius: var(--radius-sm);
            border: 1px solid var(--border);
        }
        .record-row a { color: var(--text); text-decoration: none; font-weight: 600; }
        .record-row a:hover { color: var(--accent); }
        .record-row .proof { color: var(--text-muted); font-size: 0.9em; }
        .record-row .proof:hover { color: var(--accent); }

        .record-user,
        .verifier-user {
            display: inline-flex;
            align-items: center;
            gap: 9px;
            min-width: 0;
        }

        .record-user-icon,
        .verifier-user-icon {
            width: 34px;
            height: 34px;
            min-width: 34px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .record-user-icon .gd-icon-canvas,
        .verifier-user-icon .gd-icon-canvas {
            width: 30px;
            height: 30px;
            max-width: 30px;
            max-height: 30px;
            object-fit: contain;
            image-rendering: auto;
        }

        .record-user-link,
        .verifier-user-link {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            min-width: 0;
        }

        .record-role-badge,
        .verifier-role-badge {
            width: 22px;
            height: 22px;
            object-fit: contain;
            flex-shrink: 0;
        }


        .tabs {
            display: flex;
            gap: 6px;
            margin-bottom: 22px;
            border-bottom: 1px solid var(--border);
        }
        .tab-btn {
            padding: 12px 20px;
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-family: var(--font-body);
            font-size: 1em;
            font-weight: 600;
            transition: color 0.15s;
        }
        .tab-btn:hover { color: var(--text); }
        .tab-btn.active {
            color: var(--accent);
            border-bottom: 2px solid var(--accent);
            margin-bottom: -1px;
        }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .history-table {
            width: 100%;
            border-collapse: collapse;
            background: var(--surface);
            border-radius: var(--radius);
            overflow: hidden;
        }
        .history-table th {
            background: var(--surface-2);
            padding: 13px;
            text-align: left;
            color: var(--text-muted);
            font-size: 0.8em;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .history-table td { padding: 13px; border-bottom: 1px solid var(--border); }

        .row-up { background-color: rgba(0, 230, 118, 0.08); color: #7ff0b3; }
        .row-down { background-color: rgba(255, 82, 82, 0.08); color: #ff9999; }
        .row-added { background-color: rgba(255, 255, 255, 0.03); }
    </style>
</head>
<body>
    <div id="global-nav"></div>

    <main class="page-content" id="main-content" style="display:none;">
        <div id="legacy-warning" class="legacy-warning">This level is in the legacy list, you CANNOT submit records for it!</div>

        <div class="info-header">
            <h1 id="demon-name">Level Name</h1>
            <div style="margin-top: 10px; display: flex; align-items: center; gap: 15px;">
                <p style="margin: 0;">Published by <span id="demon-author" style="color: var(--text);">...</span></p>
                <span id="level-id-tag">ID: Loading...</span>
            </div>
            <a id="play-link" href="#" target="_blank">
                Play Level!
            </a>
        </div>

        <div class="video-container" id="video-container"></div>
        <div id="verifier-container"></div>

        <div class="tabs">
            <button class="tab-btn active" onclick="openTab(event, 'records')">Records</button>
            <button class="tab-btn" onclick="openTab(event, 'history')">Position History</button>
        </div>

        <div id="records" class="tab-content active">
            <div id="records-list"></div>
        </div>

        <div id="history" class="tab-content">
            <table class="history-table">
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Change</th>
                        <th>New Position</th>
                        <th>Reason</th>
                    </tr>
                </thead>
                <tbody id="history-list">
                </tbody>
            </table>
        </div>
    </main>

    <main class="page-content" id="not-found-content" style="display:none;">
        <div class="not-found-card">
            <h1>Where are you going?</h1>
            <p>The level you are looking for does not exist or has been removed.</p>
        </div>
    </main>

    <script src="/nav.js"></script>
    <script>
        const isImpossibleList = window.location.hostname.includes('impossible');

        const WBDLIconRenderer = (() => {
            const ICON_CATEGORY_CONFIG = {
                cube: { key: 'cube', label: 'Cube', folder: 'cubes', prefix: 'player' },
                ship: { key: 'ship', label: 'Ship', folder: 'ships', prefix: 'ship' },
                ball: { key: 'ball', label: 'Ball', folder: 'balls', prefix: 'player_ball' },
                ufo: { key: 'ufo', label: 'UFO', folder: 'ufos', prefix: 'bird' },
                wave: { key: 'wave', label: 'Wave', folder: 'waves', prefix: 'dart' },
                robot: { key: 'robot', label: 'Robot', folder: 'robots', prefix: 'robot' },
                spider: { key: 'spider', label: 'Spider', folder: 'spiders', prefix: 'spider' },
                swing: { key: 'swing', label: 'Swing', folder: 'swings', prefix: 'swing' },
                jetpack: { key: 'jetpack', label: 'Jetpack', folder: 'jetpacks', prefix: 'jetpack' },
            };

            let colorsPromise = null;
            const animDescCache = {};

            function getCategory(type) {
                return ICON_CATEGORY_CONFIG[type] || ICON_CATEGORY_CONFIG.cube;
            }

            function getCategories() {
                return Object.values(ICON_CATEGORY_CONFIG);
            }

            function getAssetUrl(path) {
                return new URL(path.replace(/^\/+/, ''), window.location.origin + '/').href;
            }

            async function loadColors() {
                if (!colorsPromise) {
                    colorsPromise = fetch('/assets/colors.json')
                        .then(res => res.ok ? res.json() : {})
                        .catch(() => ({}));
                }
                return colorsPromise;
            }

            async function getColor(colorId, fallback) {
                const colors = await loadColors();
                const color = colors[String(colorId)] || fallback;
                return {
                    r: Number(color?.r ?? fallback.r),
                    g: Number(color?.g ?? fallback.g),
                    b: Number(color?.b ?? fallback.b),
                };
            }

            function parsePlistFrames(xmlText) {
                const cleaned = String(xmlText || '').replace(/^[^<]+/, '').replace(/<!DOCTYPE[^[>]*(?:\[[^\]]*\])?>/i, '');
                const doc = new DOMParser().parseFromString(cleaned, 'text/xml');

                function parseNode(el) {
                    switch (el.tagName) {
                        case 'dict': {
                            const obj = {};
                            const kids = Array.from(el.children);
                            for (let i = 0; i + 1 < kids.length; i += 2) {
                                obj[kids[i].textContent] = parseNode(kids[i + 1]);
                            }
                            return obj;
                        }
                        case 'array': return Array.from(el.children).map(parseNode);
                        case 'string': return el.textContent;
                        case 'integer': return parseInt(el.textContent, 10);
                        case 'real': return parseFloat(el.textContent);
                        case 'true': return true;
                        case 'false': return false;
                        default: return el.textContent;
                    }
                }

                if (doc.querySelector('parsererror')) return {};
                const rootEl = doc.querySelector('plist > dict') || doc.querySelector('dict');
                if (!rootEl) return {};
                const root = parseNode(rootEl);
                return (root && root.frames) || root || {};
            }

            function parseGDCoord(str) {
                return ((str || '').match(/-?\d+(?:\.\d+)?/g) || []).map(Number);
            }

            function normalizeAtlasFrame(frame) {
                if (!frame) return null;
                return {
                    textureRect: frame.textureRect || frame.frame || frame.frameRect || frame.rect || null,
                    spriteSourceSize: frame.spriteSourceSize || frame.sourceSize || frame.spriteSize || frame.spriteRect || null,
                    spriteOffset: frame.spriteOffset || frame.offset || '{0,0}',
                    textureRotated: frame.textureRotated ?? frame.rotated ?? false,
                };
            }

            function getAtlasRenderPrefix(frameKeys, baseName) {
                const hasMatchingFrames = frameKeys.some(key => key.startsWith(`${baseName}_`) && key.endsWith('_001.png'));
                return hasMatchingFrames ? baseName : null;
            }

            function compareAtlasLayers(left, right) {
                const parseInfo = (key) => {
                    const tokens = key.replace(/_001\.png$/, '').split('_').slice(2);
                    const isExtra = tokens.includes('extra');
                    const isNumberedPart = !isExtra && tokens.length > 1 && /^\d+$/.test(tokens[1]);
                    const priority = isExtra ? 2 : isNumberedPart ? 1 : 0;
                    const normalizedTokens = tokens.map(token => (/^\d+$/.test(token) ? Number(token) : token));
                    return { priority, tokens: normalizedTokens };
                };

                const leftInfo = parseInfo(left);
                const rightInfo = parseInfo(right);
                if (leftInfo.priority !== rightInfo.priority) return leftInfo.priority - rightInfo.priority;

                const maxLength = Math.max(leftInfo.tokens.length, rightInfo.tokens.length);
                for (let i = 0; i < maxLength; i++) {
                    const l = leftInfo.tokens[i];
                    const r = rightInfo.tokens[i];
                    if (l === undefined) return -1;
                    if (r === undefined) return 1;
                    if (l === r) continue;
                    if (typeof l === 'number' && typeof r === 'number') return l - r;
                    if (typeof l === 'number') return -1;
                    if (typeof r === 'number') return 1;
                    return String(l).localeCompare(String(r));
                }
                return left.localeCompare(right);
            }

            function tintCanvas(canvas, color, keepShading = true) {
                const ctx = canvas.getContext('2d');
                const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                const pixels = imageData.data;

                for (let i = 0; i < pixels.length; i += 4) {
                    const alpha = pixels[i + 3];
                    if (!alpha) continue;

                    const r = pixels[i];
                    const g = pixels[i + 1];
                    const b = pixels[i + 2];
                    const brightness = (r + g + b) / 3;

                    if (brightness < 52) {
                        continue;
                    }

                    const shade = keepShading
                        ? Math.max(0.35, Math.min(1, brightness / 255))
                        : 1;

                    pixels[i] = Math.round(color.r * shade);
                    pixels[i + 1] = Math.round(color.g * shade);
                    pixels[i + 2] = Math.round(color.b * shade);
                }

                ctx.putImageData(imageData, 0, 0);
                return canvas;
            }

            function makeFallbackCanvas(label = '?') {
                const canvas = document.createElement('canvas');
                canvas.width = 96;
                canvas.height = 96;
                const ctx = canvas.getContext('2d');
                ctx.fillStyle = 'rgba(255,255,255,0.08)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.strokeStyle = 'rgba(255,255,255,0.22)';
                ctx.strokeRect(0.5, 0.5, canvas.width - 1, canvas.height - 1);
                ctx.fillStyle = 'rgba(255,255,255,0.72)';
                ctx.font = 'bold 42px sans-serif';
                ctx.textAlign = 'center';
                ctx.imageSmoothingEnabled = true;
                ctx.imageSmoothingQuality = 'high';
                ctx.textBaseline = 'middle';
                ctx.fillText(label, canvas.width / 2, canvas.height / 2);
                return canvas;
            }

            async function renderIcon({ type = 'cube', id = 1, color1 = 12, color2 = 3, glow = -1 } = {}, options = {}) {
                const category = getCategory(type);
                const iconNum = Math.max(1, parseInt(id, 10) || 1);
                const numStr = String(iconNum).padStart(2, '0');
                const baseName = `${category.prefix}_${numStr}`;
                const assetQuality = options.quality === 'uhd' ? 'uhd' : 'hd';
                const assetName = `${baseName}-${assetQuality}`;
                const iconPath = `/assets/icons/${category.folder}/${assetName}`;

                const [mainColor, secondColor, glowColor] = await Promise.all([
                    getColor(color1, { r: 0, g: 230, b: 118 }),
                    getColor(color2, { r: 255, g: 255, b: 255 }),
                    getColor(glow, { r: 255, g: 255, b: 255 }),
                ]);

                let frames;
                try {
                    const resp = await fetch(`${iconPath}.plist`);
                    if (!resp.ok) return makeFallbackCanvas(String(iconNum));
                    frames = parsePlistFrames(await resp.text());
                } catch (err) {
                    return makeFallbackCanvas(String(iconNum));
                }

                const texture = await new Promise(resolve => {
                    const img = new Image();
                    img.onload = () => resolve(img);
                    img.onerror = () => resolve(null);
                    img.src = getAssetUrl(`${iconPath}.png`);
                });
                if (!texture) return makeFallbackCanvas(String(iconNum));

                const frameKeys = Object.keys(frames);
                const renderPrefix = getAtlasRenderPrefix(frameKeys, baseName);
                if (!renderPrefix) return makeFallbackCanvas(String(iconNum));
                const baseLen = renderPrefix.length + 1;

                const glowLayerKeys = frameKeys
                    .filter(key => key.startsWith(`${renderPrefix}_`) && key.endsWith('_001.png') && key.includes('_glow_'))
                    .sort(compareAtlasLayers);

                const layerKeys = frameKeys
                    .filter(key => key.startsWith(`${renderPrefix}_`) && key.endsWith('_001.png') && !key.includes('_glow_'))
                    .sort(compareAtlasLayers)
                    .sort((left, right) => {
                        const leftPart = left.slice(baseLen, -'_001.png'.length);
                        const rightPart = right.slice(baseLen, -'_001.png'.length);
                        const leftIsBody = leftPart === '001';
                        const rightIsBody = rightPart === '001';
                        const leftIsSecond = /(?:^|_)0*2$/.test(leftPart);
                        const rightIsSecond = /(?:^|_)0*2$/.test(rightPart);
                        if (leftIsSecond !== rightIsSecond) return leftIsSecond ? -1 : 1;
                        if (leftIsBody !== rightIsBody) return leftIsBody ? 1 : -1;
                        return 0;
                    });

                if (!layerKeys.length) return makeFallbackCanvas(String(iconNum));

                if (category.key === 'robot' || category.key === 'spider') {
                    const animDescFilename = category.key === 'robot' ? 'Robot_AnimDesc.plist' : 'Spider_AnimDesc.plist';
                    const animDescUrl = getAssetUrl(`/assets/icons/${animDescFilename}`);

                    if (animDescCache[animDescUrl] === undefined) {
                        try {
                            const ar = await fetch(animDescUrl);
                            animDescCache[animDescUrl] = ar.ok ? parsePlistFrames(await ar.text()) : null;
                        } catch (err) {
                            animDescCache[animDescUrl] = null;
                        }
                    }

                    const animDesc = animDescCache[animDescUrl];

                    const idleKey = category.key === 'robot' ? 'Robot_idle_001.png' : 'Spider_idle_001.png';
                    const idleFrame = animDesc && animDesc.animationContainer && animDesc.animationContainer[idleKey];

                    if (idleFrame) {
                        const SCALE = assetQuality === 'uhd' ? 4 : 2;
                        const prefix01 = `${category.prefix}_01_`;

                        function actualTex(name) {
                            return String(name || '').replace(prefix01, `${renderPrefix}_`);
                        }

                        const spriteList = Object.values(idleFrame)
                            .filter(sprite => sprite && sprite.texture)
                            .sort((a, b) => (parseInt(a.zValue, 10) || 0) - (parseInt(b.zValue, 10) || 0));

                        let minX = 0;
                        let minY = 0;
                        let maxX = 1;
                        let maxY = 1;

                        function getSpriteTransform(sprite) {
                            const [px = 0, py = 0] = parseGDCoord(sprite.position);
                            const [sxRaw = 1, syRaw = 1] = parseGDCoord(sprite.scale);
                            const [flipXRaw = 0, flipYRaw = 0] = parseGDCoord(sprite.flipped);
                            const sx = Number.isFinite(sxRaw) ? sxRaw : 1;
                            const sy = Number.isFinite(syRaw) ? syRaw : 1;
                            const rot = (parseFloat(sprite.rotation) || 0) * Math.PI / 180;
                            const flipX = flipXRaw ? -1 : 1;
                            const flipY = flipYRaw ? -1 : 1;
                            return { px, py, sx, sy, rot, flipX, flipY };
                        }

                        for (const sprite of spriteList) {
                            const frame = normalizeAtlasFrame(frames[actualTex(sprite.texture)]);
                            if (!frame) continue;

                            const [, , rw = 0, rh = 0] = parseGDCoord(frame.textureRect);
                            const [ox = 0, oy = 0] = parseGDCoord(frame.spriteOffset);
                            const { px, py, sx, sy, rot, flipX, flipY } = getSpriteTransform(sprite);
                            const cosR = Math.cos(rot);
                            const sinR = Math.sin(rot);

                            for (const [cornerX, cornerY] of [
                                [ox - rw / 2, -oy - rh / 2],
                                [ox + rw / 2, -oy - rh / 2],
                                [ox - rw / 2, -oy + rh / 2],
                                [ox + rw / 2, -oy + rh / 2],
                            ]) {
                                const scx = cornerX * sx * flipX;
                                const scy = cornerY * sy * flipY;
                                const wx = px * SCALE + scx * cosR - scy * sinR;
                                const wy = -py * SCALE + scx * sinR + scy * cosR;
                                if (wx < minX) minX = wx;
                                if (wx > maxX) maxX = wx;
                                if (wy < minY) minY = wy;
                                if (wy > maxY) maxY = wy;
                            }
                        }

                        const renderScale = 2;
                        const logicalW = Math.max(1, Math.ceil(maxX - minX));
                        const logicalH = Math.max(1, Math.ceil(maxY - minY));
                        const canvas = document.createElement('canvas');
                        canvas.width = logicalW * renderScale;
                        canvas.height = logicalH * renderScale;
                        canvas.style.width = `${logicalW}px`;
                        canvas.style.height = `${logicalH}px`;
                        const ctx = canvas.getContext('2d');
                        ctx.imageSmoothingEnabled = true;
                        ctx.imageSmoothingQuality = 'high';
                        ctx.scale(renderScale, renderScale);

                        function drawTex(texName, sprite, tintColor) {
                            const frame = normalizeAtlasFrame(frames[texName]);
                            if (!frame) return;

                            const [rx, ry, rw, rh] = parseGDCoord(frame.textureRect);
                            const [ox = 0, oy = 0] = parseGDCoord(frame.spriteOffset);
                            const rotated = frame.textureRotated === true;

                            const tmp = document.createElement('canvas');
                            tmp.width = rw;
                            tmp.height = rh;
                            const tctx = tmp.getContext('2d');
                            tctx.imageSmoothingEnabled = true;
                            tctx.imageSmoothingQuality = 'high';

                            if (rotated) {
                                tctx.save();
                                tctx.translate(rw / 2, rh / 2);
                                tctx.rotate(-Math.PI / 2);
                                tctx.drawImage(texture, rx, ry, rh, rw, -rh / 2, -rw / 2, rh, rw);
                                tctx.restore();
                            } else {
                                tctx.drawImage(texture, rx, ry, rw, rh, 0, 0, rw, rh);
                            }

                            if (tintColor) {
                                tintCanvas(tmp, tintColor, true);
                            }

                            const { px, py, sx, sy, rot, flipX, flipY } = getSpriteTransform(sprite);
                            ctx.save();
                            ctx.translate(-minX + px * SCALE, -minY - py * SCALE);
                            ctx.rotate(rot);
                            ctx.scale(sx * flipX, sy * flipY);
                            ctx.drawImage(tmp, 0, 0, rw, rh, ox - rw / 2, -oy - rh / 2, rw, rh);
                            ctx.restore();
                        }

                        if (Number(glow) >= 0) {
                            for (const sprite of spriteList) {
                                const mainName = actualTex(sprite.texture);
                                drawTex(mainName.replace('_001.png', '_glow_001.png'), sprite, glowColor);
                            }
                        }

                        for (const sprite of spriteList) {
                            const mainName = actualTex(sprite.texture);
                            drawTex(mainName.replace('_001.png', '_2_001.png'), sprite, secondColor);
                        }

                        for (const sprite of spriteList) {
                            const mainName = actualTex(sprite.texture);
                            drawTex(mainName, sprite, mainColor);
                        }

                        for (const sprite of spriteList) {
                            const mainName = actualTex(sprite.texture);
                            drawTex(mainName.replace('_001.png', '_extra_001.png'), sprite, null);
                        }

                        return canvas;
                    }
                }

                let canvW = 1;
                let canvH = 1;
                for (const key of [...layerKeys, ...(Number(glow) >= 0 ? glowLayerKeys : [])]) {
                    const frame = normalizeAtlasFrame(frames[key]);
                    if (!frame) continue;
                    const [ssw, ssh] = parseGDCoord(frame.spriteSourceSize);
                    if (ssw > canvW) canvW = ssw;
                    if (ssh > canvH) canvH = ssh;
                }

                const renderScale = 2;
                const logicalW = Math.max(1, Math.ceil(canvW));
                const logicalH = Math.max(1, Math.ceil(canvH));
                const canvas = document.createElement('canvas');
                canvas.width = logicalW * renderScale;
                canvas.height = logicalH * renderScale;
                canvas.style.width = `${logicalW}px`;
                canvas.style.height = `${logicalH}px`;
                const ctx = canvas.getContext('2d');
                ctx.imageSmoothingEnabled = true;
                ctx.imageSmoothingQuality = 'high';
                ctx.scale(renderScale, renderScale);

                function drawAtlasLayer(key, tintColor = null) {
                    const frame = normalizeAtlasFrame(frames[key]);
                    if (!frame) return;

                    const [rx, ry, rw, rh] = parseGDCoord(frame.textureRect);
                    const [ox = 0, oy = 0] = parseGDCoord(frame.spriteOffset);
                    const rotated = frame.textureRotated === true;
                    const tmp = document.createElement('canvas');
                    tmp.width = rw;
                    tmp.height = rh;
                    const tctx = tmp.getContext('2d');
                    tctx.imageSmoothingEnabled = true;
                    tctx.imageSmoothingQuality = 'high';

                    if (rotated) {
                        tctx.save();
                        tctx.translate(rw / 2, rh / 2);
                        tctx.rotate(-Math.PI / 2);
                        tctx.drawImage(texture, rx, ry, rh, rw, -rh / 2, -rw / 2, rh, rw);
                        tctx.restore();
                    } else {
                        tctx.drawImage(texture, rx, ry, rw, rh, 0, 0, rw, rh);
                    }

                    if (tintColor) {
                        tintCanvas(tmp, tintColor, true);
                    }

                    const ufoYOffset = category.key === 'ufo' ? 10 : 0;
                    const dx = logicalW / 2 + ox - rw / 2;
                    const dy = logicalH / 2 - oy - rh / 2 + ufoYOffset;
                    ctx.drawImage(tmp, 0, 0, rw, rh, dx, dy, rw, rh);
                }

                if (Number(glow) >= 0) {
                    for (const key of glowLayerKeys) {
                        drawAtlasLayer(key, glowColor);
                    }
                }

                for (const key of layerKeys) {
                    const part = key.slice(baseLen, -'_001.png'.length);
                    const isSecondary = /(?:^|_)0*2$/.test(part);
                    const isExtra = /extra/.test(part);
                    drawAtlasLayer(key, isExtra ? null : (isSecondary ? secondColor : mainColor));
                }

                return canvas;
            }

            async function renderInto(host, icon, options = {}) {
                if (!host) return;
                host.textContent = '';
                host.classList.add('is-loading');
                const rendered = await renderIcon(icon, options);
                rendered.className = 'gd-icon-canvas';
                rendered.style.imageRendering = 'auto';
                host.classList.remove('is-loading');
                host.replaceChildren(rendered);
            }

            return { getCategories, loadColors, renderIcon, renderInto };
        })();


        function escapeHtml(str) {
            return String(str ?? '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function getDisplayName(user = {}) {
            return String(user.displayName || user.display_name || user.username || '').trim();
        }

        function getRoleBadgeSrc(role) {
            switch (String(role || '').toLowerCase()) {
                case 'owner': return '/assets/owner.png';
                case 'admin': return '/assets/eldermoderator.png';
                case 'moderator': return '/assets/moderator.png';
                default: return '';
            }
        }

        function getDefaultIcon() {
            return { type: 'cube', id: 1, color1: 12, color2: 3, glow: -1 };
        }

        function getUserIcon(user = {}) {
            return user.icon || {
                type: user.icon_type || 'cube',
                id: user.icon_id ?? 1,
                color1: user.color1 ?? 12,
                color2: user.color2 ?? 3,
                glow: user.glow ?? -1,
            };
        }

        if (isImpossibleList) {
            document.body.classList.add('impossible-list');
        }

        function escapeHtml(str) {
            return String(str ?? '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function getProfileUrl(username) {
            return `/profile?user=${encodeURIComponent(username ?? '')}`;
        }


        function getUserBadgeHtml(user = {}, className = 'record-role-badge') {
            const badgeSrc = getRoleBadgeSrc(user.role);
            return badgeSrc ? `<img class="${className}" src="${badgeSrc}" alt="${escapeHtml(user.role)}">` : '';
        }

        function getUserNameLink(user = {}, linkClass = 'record-user-link', badgeClass = 'record-role-badge') {
            const username = String(user.username || '');
            const displayName = getDisplayName(user) || username;
            return `<a class="${linkClass}" href="${getProfileUrl(username)}">${getUserBadgeHtml(user, badgeClass)}<span>${escapeHtml(displayName)}</span></a>`;
        }

        function hydrateUserIcon(hostId, user) {
            WBDLIconRenderer.renderInto(
                document.getElementById(hostId),
                getUserIcon(user),
                { quality: 'uhd' }
            );
        }

        function levelNotFound() {
            const mainContent = document.getElementById('main-content');
            const notFoundContent = document.getElementById('not-found-content');

            if (mainContent) mainContent.style.display = 'none';
            if (notFoundContent) notFoundContent.style.display = 'block';
        }

        function openTab(evt, tabId) {
            const contents = document.getElementsByClassName("tab-content");
            for (let i = 0; i < contents.length; i++) {
                contents[i].classList.remove("active");
            }

            const buttons = document.getElementsByClassName("tab-btn");
            for (let i = 0; i < buttons.length; i++) {
                buttons[i].classList.remove("active");
            }

            document.getElementById(tabId).classList.add("active");
            evt.currentTarget.classList.add("active");
        }

        async function loadDemon() {
            const pathSegments = window.location.pathname.split('/');
            const dbKey = pathSegments[pathSegments.length - 1]; 

            if (!dbKey || isNaN(dbKey)) {
                levelNotFound();
                return;
            }

            const res = await fetch(`/api/demons/${dbKey}`);
            if (!res.ok) {
                levelNotFound();
                return;
            }

            const data = await res.json();
            document.getElementById('not-found-content').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';

            const isLegacy = data.position > 150;
            document.getElementById('demon-name').innerText = isLegacy ? data.name : `#${data.position} - ${data.name}`;
            document.getElementById('legacy-warning').style.display = isLegacy ? 'block' : 'none';
            document.getElementById('demon-author').innerText = data.author;
            document.getElementById('level-id-tag').innerText = `ID: ${data.level_id}`;

            document.getElementById('play-link').href = `https://web-dashers.github.io/?id=${data.level_id}`;

            if (data.showcase_link) {
                const videoContainer = document.getElementById('video-container');
                videoContainer.innerHTML = getEmbedHtml(data.showcase_link);
            }

            const list = document.getElementById('records-list');
            const verifierContainer = document.getElementById('verifier-container');
            const records = Array.isArray(data.records) ? data.records : [];

            verifierContainer.innerHTML = "";

            if (records.length === 0) {
                list.innerHTML = "<p style='color:#666; padding: 15px;'>No records yet.</p>";
            } else {
                let normalRecords = records;

                if (!isImpossibleList) {
                    const verifier = records[0];
                    normalRecords = records.slice(1);

                    verifierContainer.innerHTML = `
                        <div class="verifier-row">
                            <span>Verifier: <a href="${getProfileUrl(verifier.username)}">${escapeHtml(verifier.username)}</a></span>
                        </div>
                    `;
                }

                const recordsHtml = normalRecords.map((r, idx) => {
                    let percentageColor = "";
                    if (r.percentage === 100) {
                        percentageColor = isImpossibleList ? "#ff4444" : "#00e676";
                    } else {
                        percentageColor = isImpossibleList ? "#ff6666" : "#ffaa00";
                    }

                    return `
                        <div class="record-row">
                            <span class="record-user">
                                <span class="record-user-icon" id="record-user-icon-${idx}" aria-hidden="true"></span>
                                ${getUserNameLink(r)}
                                <span style="color:${percentageColor}"> - ${escapeHtml(r.percentage)}%</span>
                            </span>
                            <a href="${escapeHtml(r.video_url)}" target="_blank" class="proof">Watch</a>
                        </div>
                    `;
                }).join('');

                list.innerHTML = recordsHtml || "<p style='color:#666; padding: 15px;'>No records yet.</p>";

                normalRecords.forEach((r, idx) => {
                    hydrateUserIcon(`record-user-icon-${idx}`, r);
                });
            }

            loadHistory(dbKey);
        }

        function getEmbedHtml(url) {
            if (!url) return `<p style="color:var(--text-muted); text-align:center; padding: 40px 0;">No video documentation available.</p>`;

            const ytRegex = /(?:youtube\.com\/(?:[^\/]+\/.+\/|(?:v|e(?:mbed)?)\/|.*[?&]v=)|youtu\.be\/)([^"&?\/ ]{11})/;
            const ytMatch = url.match(ytRegex);

            if (ytMatch) {
                const videoId = ytMatch[1];
                return `<iframe src="https://www.youtube.com/embed/${videoId}" allowfullscreen></iframe>`;
            }

            return `
                <video controls playsinline style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: contain;">
                    <source src="${url}" type="video/mp4">
                    <source src="${url}" type="video/webm">
                    Your browser does not support the video tag.
                </video>
            `;
        }

        async function loadHistory(id) {
            try {
                const res = await fetch(`/api/demons/${id}/history`);
                const history = await res.json();
                const historyList = document.getElementById('history-list');

                if (!history.length) {
                    historyList.innerHTML = "<tr><td colspan='4' style='text-align:center; color:#666;'>No history recorded.</td></tr>";
                    return;
                }

                const visibleHistory = history.filter(log => {
                    if (log.change_type === 'added') return true;

                    const newPosition = Number(log.new_position);
                    const diff = Number(log.diff || 0);
                    const oldPosition = newPosition + diff;

                    const wasLegacy = oldPosition > 150;
                    const isLegacy = newPosition > 150;

                    return !(wasLegacy && isLegacy);
                });

                if (!visibleHistory.length) {
                    historyList.innerHTML = "<tr><td colspan='4' style='text-align:center; color:#666;'>No visible history recorded.</td></tr>";
                    return;
                }

                historyList.innerHTML = visibleHistory.map(log => {
                    const date = new Date(log.created_at).toLocaleDateString(undefined, {
                        month: 'short', day: 'numeric', year: 'numeric'
                    });

                    let changeStr = "-";
                    let rowClass = "row-neutral";

                    if (log.diff > 0) {
                        changeStr = `+${log.diff}`;
                        rowClass = "row-up";
                    } else if (log.diff < 0) {
                        changeStr = `${log.diff}`; 
                        rowClass = "row-down";
                    } else if (log.change_type === 'added') {
                        changeStr = "-";
                    }

                    const formattedReason = log.reason 
                        ? log.reason.replace(/\*\*(.*?)\*\*/g, '<span class="b">$1</span>') 
                        : '';

                    return `
                        <tr class="${rowClass}">
                            <td>${date}</td>
                            <td style="font-weight:bold;">${changeStr}</td>
                            <td>${log.new_position > 150 ? 'Legacy' : `#${log.new_position}`}</td>
                            <td>${formattedReason}</td>
                        </tr>
                    `;
                }).join('');
            } catch (err) {
                console.error("History failed to load:", err);
            }
        }

        loadDemon();
    </script>
